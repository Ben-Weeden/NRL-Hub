<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#08080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tweed Seagulls">

<title>Tweed Seagulls — BMD Premiership 2026 Coach Report</title>
<style>
  :root {
    --navy:#004BA0; --gold:#F5C400; --dark:#08080f;
    --card:#111120; --card2:#181830; --border:#1e1e3a;
    --text:#e8e8f8; --muted:#8888aa;
    --green:#2ecc71; --red:#e74c3c; --amber:#F5A623;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

  /* HERO */
  .hero{background:linear-gradient(135deg,#020a1e 0%,#00297a 50%,#020a1e 100%);padding:28px 24px 24px;border-bottom:3px solid var(--navy);position:relative;overflow:hidden;}
  .hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--navy));}
  .hero-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .hero-crest{width:80px;height:80px;border-radius:16px;background:linear-gradient(135deg,var(--navy),#0066cc);border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:var(--gold);flex-shrink:0;box-shadow:0 0 30px rgba(0,75,160,.5);}
  .hero-text h1{font-size:clamp(22px,4vw,36px);font-weight:900;color:#fff;letter-spacing:-1px;}
  .hero-text h1 span{color:var(--gold);}
  .hero-text p{color:var(--muted);font-size:13px;margin-top:4px;}
  .hero-badges{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .hb{background:rgba(0,75,160,.25);border:1px solid rgba(0,75,160,.5);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .hb.gold{background:rgba(245,196,0,.15);border-color:rgba(245,196,0,.4);color:var(--gold);}
  .hb.alert{background:rgba(231,76,60,.15);border-color:rgba(231,76,60,.4);color:#e74c3c;animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.6;}}
  .hero-stats{display:flex;gap:16px;flex-wrap:wrap;margin-top:20px;}
  .hs{background:rgba(0,75,160,.15);border:1px solid rgba(0,75,160,.3);border-radius:10px;padding:12px 18px;text-align:center;min-width:90px;}
  .hs-val{font-size:26px;font-weight:900;color:var(--gold);}
  .hs-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

  /* NAV */
  .nav{display:flex;background:#0a0a18;border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:0;z-index:100;}
  .tab-btn{padding:14px 22px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:.5px;transition:all .2s;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--gold);border-bottom-color:var(--navy);}

  /* PANELS */
  .panel{display:none;padding:24px;max-width:1100px;margin:0 auto;}
  .panel.active{display:block;}

  /* CARDS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
  .card-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .card-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .card-title.gold{color:var(--gold);}
  .card-title.red{color:var(--red);}
  .card-title.green{color:var(--green);}
  .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}
  .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}

  /* STAT BOXES */
  .stat-row{display:flex;justify-content:space-around;flex-wrap:wrap;gap:12px;}
  .stat-box{background:var(--card2);border-radius:10px;padding:14px 20px;text-align:center;flex:1;min-width:100px;}
  .stat-box-val{font-size:28px;font-weight:900;}
  .stat-box-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .stat-box.bad .stat-box-val{color:var(--red);}
  .stat-box.ok .stat-box-val{color:var(--amber);}
  .stat-box.good .stat-box-val{color:var(--green);}
  .stat-box.neutral .stat-box-val{color:var(--gold);}

  /* GAME BREAKDOWN */
  .game-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px;position:relative;overflow:hidden;}
  .game-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--red);}
  .game-card.close::before{background:var(--amber);}
  .game-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .game-round{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);}
  .game-matchup{font-size:20px;font-weight:900;color:#fff;margin-top:4px;}
  .game-score{text-align:center;}
  .game-score-num{font-size:32px;font-weight:900;letter-spacing:2px;}
  .game-score-num .ours{color:var(--gold);}
  .game-score-num .theirs{color:var(--red);}
  .game-margin{font-size:12px;color:var(--muted);margin-top:2px;}
  .game-analysis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px;}
  .analysis-box{background:var(--card);border-radius:8px;padding:10px;}
  .analysis-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .analysis-label.pos{color:var(--green);}
  .analysis-label.neg{color:var(--red);}
  .analysis-label.focus{color:var(--amber);}
  .analysis-text{font-size:12px;color:var(--muted);line-height:1.6;}

  /* RATING BARS */
  .bar-row{display:flex;align-items:center;gap:10px;margin:8px 0;}
  .bar-label{font-size:11px;color:var(--muted);width:130px;flex-shrink:0;}
  .bar-bg{flex:1;height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;transition:width .8s ease;}
  .bar-val{font-size:11px;font-weight:700;width:40px;text-align:right;}
  .comp-avg-line{border-top:2px dashed rgba(255,255,255,.2);padding-top:8px;margin-top:8px;}
  .comp-avg-text{font-size:10px;color:var(--muted);text-align:center;}

  /* UPCOMING MATCH */
  .match-preview{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
  .mp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
  .mp-time{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);}
  .mp-matchup{font-size:18px;font-weight:900;}
  .mp-venue{font-size:11px;color:var(--muted);margin-top:3px;}
  .threat-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
  .threat-high{background:rgba(231,76,60,.2);border:1px solid rgba(231,76,60,.5);color:#e74c3c;}
  .threat-med{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.4);color:var(--amber);}
  .opp-stats{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;}
  .opp-stat{background:var(--card);border-radius:8px;padding:8px 14px;text-align:center;flex:1;min-width:70px;}
  .opp-stat-val{font-size:16px;font-weight:900;color:var(--text);}
  .opp-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;}
  .key-points{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:12px;}
  .key-point{background:var(--card);border-radius:8px;padding:12px;}
  .kp-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .kp-title.attack{color:var(--gold);}
  .kp-title.defence{color:var(--navy);}
  .kp-title.danger{color:var(--red);}
  .kp-title.exploit{color:var(--green);}
  .kp-text{font-size:12px;color:var(--muted);line-height:1.6;}
  .game-plan-box{background:linear-gradient(90deg,rgba(0,75,160,.2),rgba(245,196,0,.08));border:1px solid rgba(0,75,160,.4);border-radius:10px;padding:14px;margin-top:14px;}
  .game-plan-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--navy);margin-bottom:8px;}
  .game-plan-text{font-size:13px;color:var(--text);line-height:1.7;}

  /* FINALS PATHWAY */
  .pathway-step{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
  .pathway-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0;}
  .pathway-num.done{background:rgba(231,76,60,.2);border:2px solid var(--red);color:var(--red);}
  .pathway-num.current{background:rgba(245,166,35,.2);border:2px solid var(--amber);color:var(--amber);}
  .pathway-num.future{background:rgba(0,75,160,.2);border:2px solid var(--navy);color:var(--navy);}
  .pathway-num.goal{background:rgba(46,204,113,.15);border:2px solid var(--green);color:var(--green);}
  .pathway-content h4{font-size:14px;font-weight:700;margin-bottom:4px;}
  .pathway-content p{font-size:12px;color:var(--muted);line-height:1.5;}
  .progress-track{background:var(--card2);border-radius:12px;padding:16px;margin-bottom:18px;}
  .progress-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;}
  .progress-bar-bg{height:14px;background:rgba(255,255,255,.06);border-radius:7px;overflow:hidden;}
  .progress-bar-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--navy),var(--gold));}

  /* IMPROVEMENT AREAS */
  .improve-card{background:var(--card2);border-radius:10px;padding:16px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start;}
  .improve-icon{font-size:28px;width:44px;flex-shrink:0;text-align:center;}
  .improve-title{font-size:14px;font-weight:700;margin-bottom:4px;}
  .improve-text{font-size:12px;color:var(--muted);line-height:1.6;}
  .improve-target{display:inline-block;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--green);font-weight:700;margin-top:6px;}

  /* SVG CHARTS */
  .chart-container{overflow-x:auto;}

  /* POSITIVES */
  .positive-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(30,30,58,.6);}
  .positive-item:last-child{border-bottom:none;}
  .pos-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center;}
  .pos-text{font-size:13px;color:var(--text);line-height:1.5;}
  .pos-sub{font-size:11px;color:var(--muted);margin-top:2px;}

  @media(max-width:600px){.hero-inner{flex-direction:column;}.game-analysis{grid-template-columns:1fr;}.key-points{grid-template-columns:1fr;}}

  /* PLAYER PROFILES */
  .player-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
  .jersey-num{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;}
  .player-name-big{font-size:18px;font-weight:900;color:#fff;}
  .pos-badge-p{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;letter-spacing:.5px;}
  .rpill{display:inline-flex;width:24px;height:24px;border-radius:50%;align-items:center;justify-content:center;font-size:9px;font-weight:900;margin-right:3px;}
  .pstat{background:var(--card);border-radius:8px;padding:8px 12px;text-align:center;min-width:65px;}
  .pstat-val{font-size:18px;font-weight:900;}
  .pstat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
  .player-inner-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
  .player-insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
  .insight-box{background:var(--card);border-radius:10px;padding:12px;}
  .insight-title-p{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .insight-item{font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid rgba(30,30,58,.6);line-height:1.4;}
  .insight-item:last-child{border-bottom:none;}
  .target-box-p{background:rgba(46,204,113,.07);border:1px solid rgba(46,204,113,.2);border-radius:8px;padding:10px;margin-top:10px;}
  .mini-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:60px;}
  .mini-bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
  .leader-card-p{background:var(--card2);border-radius:10px;padding:14px;text-align:center;}
  @media(max-width:600px){.player-inner-grid,.player-insight-grid{grid-template-columns:1fr;}}
</style>
</head>

// ═══════ OPPOSITION DEFENCE ANALYTICS ═══════
function oppDefCompute(allGames, myTeam){
  const t={};
  const ens=n=>{ if(!t[n]) t[n]={team:n,g:0,pa:0,h1a:0,h2a:0,htG:0,log:[],zero:0,over30:0}; return t[n]; };
  allGames.forEach(g=>{
    [[g.home,g.as,g.ha!=null?g.ha:null,g.as-(g.ha!=null?g.ha:0),g.r,g.away],[g.away,g.hs,g.hh!=null?g.hh:null,g.hs-(g.hh!=null?g.hh:0),g.r,g.home]].forEach(x=>{
      const [team,conc,h1,h2,r,opp]=x; const T=ens(team);
      T.g++; T.pa+=conc; T.log.push({r,opp,conc});
      if(h1!=null){T.htG++;T.h1a+=h1;T.h2a+=h2;}
      if(conc===0)T.zero++;
      if(conc>=30)T.over30++;
    });
  });
  Object.values(t).forEach(T=>{
    T.avg=T.g?T.pa/T.g:0;
    T.h1avg=T.htG?T.h1a/T.htG:0; T.h2avg=T.htG?T.h2a/T.htG:0;
    T.log.sort((a,b)=>a.r-b.r);
    T.last5=T.log.slice(-5);
    T.l5avg=T.last5.length?T.last5.reduce((s,x)=>s+x.conc,0)/T.last5.length:0;
    T.trend=T.l5avg-T.avg; // + = defence getting worse
  });
  return t;
}

// ═══════ ADVANCED METRICS (computed from verified results) ═══════
function advCompute(games, opts){
  opts=opts||{};
  const t={};
  const ens=n=>{ if(!t[n]) t[n]={team:n,g:0,w:0,d:0,l:0,f:0,a:0,margins:[],close:0,closeW:0,blow:0,blowW:0,h1d:0,h2d:0,htg:0}; return t[n]; };
  games.forEach(g=>{
    [[g.home,g.hs,g.as,g.hh,g.ha],[g.away,g.as,g.hs,g.ha,g.hh]].forEach(x=>{
      const [n,f,a,hf,ha]=x; const T=ens(n);
      T.g++; T.f+=f; T.a+=a; T.margins.push(f-a);
      if(f>a)T.w++; else if(f<a)T.l++; else T.d++;
      const m=Math.abs(f-a);
      if(m<=6){T.close++; if(f>a)T.closeW++;}
      if(m>=18){T.blow++; if(f>a)T.blowW++;}
      if(hf!=null){T.htg++; T.h1d+=hf-ha; T.h2d+=(f-hf)-(a-ha);}
    });
  });
  const arr=Object.values(t);
  arr.forEach(T=>{
    const e=2.0; // pythagorean exponent for rugby league
    T.pyth=T.g*(Math.pow(T.f,e)/(Math.pow(T.f,e)+Math.pow(T.a,e)||1));
    T.luck=(T.w+T.d*0.5)-T.pyth;
    T.avgM=T.margins.reduce((s,x)=>s+x,0)/T.g;
    const mean=T.avgM;
    T.vol=Math.sqrt(T.margins.reduce((s,x)=>s+(x-mean)*(x-mean),0)/T.g);
    T.swing=T.htg?(T.h2d-T.h1d)/T.htg:0;
  });
  // strength of schedule: mean of opponents' avg margin
  const rate={}; arr.forEach(T=>rate[T.team]=T.avgM);
  arr.forEach(T=>{ T.sosList=[]; });
  games.forEach(g=>{ ens(g.home).sosList.push(rate[g.away]); ens(g.away).sosList.push(rate[g.home]); });
  arr.forEach(T=>{ T.sos=T.sosList.length?T.sosList.reduce((s,x)=>s+x,0)/T.sosList.length:0; });
  return arr.sort((a,b)=>b.avgM-a.avgM);
}

  }).join('');
  const best=arr[0], luckiest=[...arr].sort((a,b)=>b.luck-a.luck)[0], unlucky=[...arr].sort((a,b)=>a.luck-b.luck)[0], hardest=[...arr].sort((a,b)=>b.sos-a.sos)[0];

  // rating bars
  const mx=Math.max(...arr.map(T=>Math.abs(T.avgM)),1);
  const bars=arr.map(T=>{

    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+

  return '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">'+tiles+'</div>'+

     '<style>.adv-tbl td{padding:6px 8px;border-top:1px solid rgba(255,255,255,.05);text-align:center}.adv-tbl th{padding:6px 8px}</style>'+
     '<table class="adv-tbl" style="width:100%;border-collapse:collapse;font-size:10.5px"><thead><tr style="color:'+muted+';font-size:8.5px;text-transform:uppercase;letter-spacing:.5px">'+
     '<th style="text-align:left">Team</th><th>Rating (avg margin)</th><th>Pyth. exp. wins</th><th>Luck (W − exp)</th><th>SOS</th><th>Volatility (σ margin)</th><th>Close (≤6) W</th><th>Blowout (18+) W</th><th>2H swing/g</th></tr></thead>'+
     '<tbody style="color:#D5DEEE">'+rows+'</tbody></table>'+
     '<p style="font-size:9px;color:'+muted+';margin-top:8px">Pythagorean expected wins from points for/against (exponent 2.0) — a truer measure of quality than the ladder. Luck = actual wins vs expectation (positive = winning more than underlying performance). SOS = average opponent power rating (positive = harder draw). Volatility = standard deviation of margins. 2H swing = second-half differential minus first-half differential per game (games with half-time data).</p></div>';
}

// ═══════ TRY ZONE — SCORING PROFILE (verified timing + channel proxies) ═══════
function tzCompute(games){
  const t={};
  const ens=n=>{ if(!t[n]) t[n]={team:n,g:0,f:0,a:0,h1f:0,h2f:0,h1a:0,h2a:0,htg:0,burst:0,shutH:0}; return t[n]; };
  games.forEach(g=>{
    [[g.home,g.hs,g.as,g.hh,g.ha],[g.away,g.as,g.hs,g.ha,g.hh]].forEach(x=>{
      const [n,f,a,hf,ha]=x; const T=ens(n);
      T.g++; T.f+=f; T.a+=a;
      if(hf!=null){ T.htg++; T.h1f+=hf; T.h2f+=f-hf; T.h1a+=ha; T.h2a+=a-ha;
        if(hf>=20||f-hf>=20)T.burst++;
        if(hf===0||f-hf===0)T.shutH++; }
    });
  });
  return Object.values(t).map(T=>({...T,
    est:T.f/4.7,  // rough tries estimate: comp scoring ≈ 4.7 pts per try incl. conversions
    h1pct:(T.h1f+T.h2f)?T.h1f/(T.h1f+T.h2f)*100:50,
    a1pct:(T.h1a+T.h2a)?T.h1a/(T.h1a+T.h2a)*100:50,
  })).sort((a,b)=>b.f-a.f);
}
function tzHTML(games, cfg){

  const S=n=>short?short(n):n;

    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;text-align:center">'+

    '<div style="margin-top:6px"><div style="font-size:8px;color:'+muted+';margin-bottom:3px">WHEN THEY CONCEDE</div>'+
      '<div style="display:flex;height:12px;border-radius:6px;overflow:hidden;opacity:.75">'+
      '<div style="width:'+T.a1pct+'%;background:#F87171;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:800;color:#0A0A1E">'+T.a1pct.toFixed(0)+'%</div>'+
      '<div style="flex:1;background:#7F1D1D;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:800;color:#fff">'+(100-T.a1pct).toFixed(0)+'%</div></div></div>'+
    '<div style="display:flex;gap:6px;margin-top:8px;font-size:8.5px;color:'+muted+'"><span>⚡ '+T.burst+' × 20+ pt halves</span><span>🧱 '+T.shutH+' × scoreless halves (them or opp)</span></div>'+
    '</div>';
  }).join('');
  const scorersHtml=scorers&&scorers.length?
    '<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:18px;margin-bottom:16px">'+

    scorers.map(s=>'<div style="display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid '+border+';border-radius:8px;margin-bottom:6px;font-size:11px;flex-wrap:wrap;gap:6px"><span><strong style="color:#fff">'+s.player+'</strong> <span style="color:'+muted+'">('+s.team+' · '+s.pos+')</span></span><span style="font-weight:800;color:'+acc2+'">'+s.stat+'</span></div>').join('')+'</div>':'';

}

// ═══════ SEASON SPLITS v2 — FULL METRIC BREAKDOWN BY THIRDS ═══════
function splitsBlockCompute(tg, sg, ctx){
  const g=tg.filter(t=>t.r>=sg.from&&t.r<=sg.to);
  if(!g.length) return {...sg,g,empty:true};
  const w=g.filter(t=>t.res==='W').length,d=g.filter(t=>t.res==='D').length,l=g.filter(t=>t.res==='L').length;
  const pf=g.reduce((s,t)=>s+t.f,0),pa=g.reduce((s,t)=>s+t.a,0);
  const wh=g.filter(t=>t.hf!=null);
  const h1f=wh.reduce((s,t)=>s+t.hf,0),h1a=wh.reduce((s,t)=>s+t.ha_,0);
  const h2f=wh.reduce((s,t)=>s+(t.f-t.hf),0),h2a=wh.reduce((s,t)=>s+(t.a-t.ha_),0);
  const led=wh.filter(t=>t.hf>t.ha_),lvl=wh.filter(t=>t.hf===t.ha_),trl=wh.filter(t=>t.hf<t.ha_);
  const cb=wh.filter(t=>t.hf<t.ha_&&t.res==='W').length, blown=wh.filter(t=>t.hf>t.ha_&&t.res==='L').length;
  const close=g.filter(t=>Math.abs(t.margin)<=6), closeW=close.filter(t=>t.res==='W').length, closeD=close.filter(t=>t.res==='D').length;
  const big=g.filter(t=>Math.abs(t.margin)>=13), bigW=big.filter(t=>t.res==='W').length;
  const hg=g.filter(t=>t.home),ag=g.filter(t=>!t.home);
  const rec=x=>x.filter(t=>t.res==='W').length+'-'+x.filter(t=>t.res==='D').length+'-'+x.filter(t=>t.res==='L').length;
  const byeN=(ctx.byes||[]).filter(r=>r>=sg.from&&r<=sg.to).length;
  // opposition-adjusted (par) + opponent quality
  let atkPar=0,defPar=0,oppPosSum=0,oppRated=0;
  g.forEach(t=>{
    const oc=ctx.oppConcede[t.opp], os=ctx.oppScore[t.opp];
    if(oc!=null){atkPar+=t.f-oc;}
    if(os!=null){defPar+=os-t.a;}
    if(ctx.lpos&&ctx.lpos[t.opp]){oppPosSum+=ctx.lpos[t.opp];oppRated++;}
  });
  const zeroH=wh.filter(t=>t.hf===0||t.f-t.hf===0).length;
  const bigH=wh.filter(t=>t.hf>=18||t.f-t.hf>=18).length;
  return {...sg,g,w,d,l,pf,pa,wh,h1f,h1a,h2f,h2a,led:led.length,lvl:lvl.length,trl:trl.length,cb,blown,
    close:close.length,closeW,closeD,big:big.length,bigW,homeRec:rec(hg),awayRec:rec(ag),byeN,
    pts:w*2+d+byeN*2, atkPar:g.length?atkPar/g.length:0, defPar:g.length?defPar/g.length:0,
    oppPos:oppRated?oppPosSum/oppRated:null, zeroH, bigH};
}

    ['Attack vs par / game*',s=>(s.atkPar>=0?'+':'')+s.atkPar.toFixed(1),'hi'],
    ['Defence vs par / game*',s=>(s.defPar>=0?'+':'')+s.defPar.toFixed(1),'hi'],
    ['Avg opponent ladder position',s=>s.oppPos?s.oppPos.toFixed(1):'—'],
  ];
  const num=v=>parseFloat(String(v).replace('%','').replace('+',''));
  const tblRows=rows.map(r=>{
    if(!r[1])return '<tr><td colspan="'+(played.length+1)+'" style="text-align:left;padding:10px 8px 4px;font-size:8.5px;font-weight:800;letter-spacing:.8px;color:'+acc2+'">'+r[0].replace(/—/g,'').trim()+'</td></tr>';
    const vals=played.map(s=>r[1](s));
    // best-block highlight for hi/lo metrics
    let bestIdx=-1;
    if(r[2]&&played.length>1){
      const nums=vals.map(num);
      if(nums.every(x=>!isNaN(x))){
        bestIdx=r[2]==='hi'?nums.indexOf(Math.max(...nums)):nums.indexOf(Math.min(...nums));
      }
    }
    return '<tr><td style="text-align:left;color:#C0CCE0">'+r[0].replace('*','<span style="color:'+muted+'">*</span>')+'</td>'+
      vals.map((v,i)=>'<td style="font-weight:800;color:'+(i===bestIdx?'#4ADE80':'#fff')+'">'+v+(i===bestIdx?' ▲':'')+'</td>').join('')+'</tr>';
  }).join('');
  const tbl='<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:18px;margin-bottom:16px;overflow-x:auto">'+
    '<h3 style="color:white;font-size:13px;font-weight:800;margin-bottom:8px">🔬 EVERY KEY METRIC — BLOCK BY BLOCK</h3>'+
    '<style>.sp-tbl td,.sp-tbl th{padding:5px 8px;border-top:1px solid rgba(255,255,255,.05);text-align:center;font-size:10.5px}.sp-tbl th{color:'+muted+';font-size:9px;letter-spacing:.5px}</style>'+
    '<table class="sp-tbl" style="width:100%;border-collapse:collapse"><thead><tr><th style="text-align:left">METRIC</th>'+played.map(s=>'<th>R'+s.from+'–'+s.to+'</th>').join('')+'</tr></thead><tbody>'+tblRows+'</tbody></table>'+
    '<p style="font-size:9px;color:'+muted+';margin-top:8px">▲ marks the better block for that metric. *Par = opponents\' season averages: attack vs par = points scored above what that opponent usually concedes; defence vs par = points that opponent scored below their usual output (positive = we held them under par). Opponent quality uses current ladder positions.</p></div>';

  // ── scoring rate comparison bars ──
  const cmp=played.map(s=>{
    const avgF=s.pf/gp(s),avgA=s.pa/gp(s);
    return '<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:800;color:#fff;margin-bottom:5px">R'+s.from+'–'+s.to+' <span style="color:'+muted+';font-weight:600">('+s.w+'-'+s.d+'-'+s.l+')</span></div>'+
     '<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span style="width:52px;font-size:8.5px;color:'+muted+';text-align:right">FOR</span><div style="flex:1;height:11px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden"><div style="width:'+(avgF/mxAvg*100)+'%;height:100%;background:'+acc+'"></div></div><span style="width:36px;font-size:10px;font-weight:800;color:#fff">'+avgF.toFixed(1)+'</span></div>'+
     '<div style="display:flex;align-items:center;gap:8px"><span style="width:52px;font-size:8.5px;color:'+muted+';text-align:right">AGAINST</span><div style="flex:1;height:11px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden"><div style="width:'+(avgA/mxAvg*100)+'%;height:100%;background:#F87171"></div></div><span style="width:36px;font-size:10px;font-weight:800;color:#fff">'+avgA.toFixed(1)+'</span></div></div>';
  }).join('');

  return '<div style="background:linear-gradient(135deg,#0A1528,#101024);border:1px solid '+acc+';border-radius:14px;padding:20px 24px;margin-bottom:16px">'+
    '<h2 style="color:white;font-size:15px;font-weight:900;margin-bottom:4px">📊 SEASON SPLITS — THE SEASON IN THIRDS</h2>'+
    '<p style="color:'+muted+';font-size:11px">'+(intro||'')+'</p></div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:16px">'+cards+'</div>'+
    tbl+
    '<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:18px;margin-bottom:16px"><h3 style="color:white;font-size:13px;font-weight:800;margin-bottom:12px">📉 MARGIN, EVERY GAME, BY BLOCK <span style="font-weight:600;color:'+muted+';font-size:10px">(above line = won the game)</span></h3><div style="display:flex;gap:24px;flex-wrap:wrap">'+mCharts+'</div></div>'+
    '<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:18px"><h3 style="color:white;font-size:13px;font-weight:800;margin-bottom:12px">📈 BLOCK-BY-BLOCK SCORING — AVG POINTS PER GAME</h3>'+cmp+'</div>';
}

function showTab(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  const idx = ['overview','games','performance','improve','pathway','defensive','oppdef','tryzone','advmetrics','thirds','benchmarks','players'].indexOf(id);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  const renders = {
    overview:renderOverview, games:renderGames, performance:renderPerformance,
    improve:renderImprove, pathway:renderPathway,
    defensive:renderDefensive, oppdef:renderOppDef, tryzone:renderTryZoneTab, advmetrics:renderAdvTab, thirds:renderThirdsTab, benchmarks:renderBenchmarks, players:renderPlayers
  };
  renders[id]();
}

function renderPerformance() {
  const el = document.getElementById('panel-performance');

  const scores = GAMES.map(g=>g.seaScore);
  const conceded = GAMES.map(g=>g.oppScore);
  const margins = GAMES.map(g=>g.oppScore-g.seaScore);
  const avgPF = (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
  const avgPA = (conceded.reduce((a,b)=>a+b,0)/conceded.length).toFixed(1);

  // SVG scoring trend
  const W=500, H=180, PAD=40;
  const allVals = [...scores,...conceded];
  const maxV = Math.max(...allVals) + 5;
  const minV = 0;
  const gapX = (W-PAD*2) / (GAMES.length-1);
  const toX = i => PAD + i*gapX;
  const toY = v => H-PAD - (v-minV)/(maxV-minV)*(H-PAD*2);
  const scorePts = scores.map((v,i)=>`${toX(i)},${toY(v)}`).join(' ');
  const concPts = conceded.map((v,i)=>`${toX(i)},${toY(v)}`).join(' ');

  const trendSvg = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <rect width="${W}" height="${H}" fill="#13131f" rx="8"/>
    ${[0,10,20,30,40].map(v=>`
      <line x1="${PAD}" y1="${toY(v)}" x2="${W-PAD}" y2="${toY(v)}" stroke="#1e1e3a" stroke-width="1"/>
      <text x="${PAD-6}" y="${toY(v)+4}" text-anchor="end" fill="#555" font-size="9">${v}</text>
    `).join('')}
    <line x1="${PAD}" y1="${toY(21.0)}" x2="${W-PAD}" y2="${toY(21.0)}" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="${W-PAD+4}" y="${toY(21.0)+4}" fill="rgba(255,255,255,0.3)" font-size="9">Comp avg</text>
    <polyline points="${concPts}" fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-linejoin="round"/>
    <polyline points="${scorePts}" fill="none" stroke="#F5C400" stroke-width="2.5" stroke-linejoin="round"/>
    ${conceded.map((v,i)=>`<circle cx="${toX(i)}" cy="${toY(v)}" r="5" fill="#e74c3c"/><text x="${toX(i)}" y="${toY(v)-8}" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">${v}</text>`).join('')}
    ${scores.map((v,i)=>`<circle cx="${toX(i)}" cy="${toY(v)}" r="5" fill="#F5C400"/><text x="${toX(i)}" y="${toY(v)-8}" text-anchor="middle" fill="#F5C400" font-size="10" font-weight="bold">${v}</text>`).join('')}
    ${GAMES.map((g,i)=>`<text x="${toX(i)}" y="${H-6}" text-anchor="middle" fill="#666" font-size="10">R${g.round}</text>`).join('')}
    <rect x="${PAD}" y="8" width="10" height="4" fill="#F5C400" rx="2"/>
    <text x="${PAD+14}" y="14" fill="#F5C400" font-size="9">Seagulls Scored</text>
    <rect x="${PAD+110}" y="8" width="10" height="4" fill="#e74c3c" rx="2"/>
    <text x="${PAD+124}" y="14" fill="#e74c3c" font-size="9">Conceded</text>
    <line x1="${W-100}" y1="11" x2="${W-90}" y2="11" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="${W-86}" y="14" fill="rgba(255,255,255,0.3)" font-size="9">Comp Avg (21.0)</text>
  </svg>`;

  // Margin bar chart
  const mW=500, mH=120, mPAD=40;
  const maxM = Math.max(...margins)+5;
  const mGapX = (mW-mPAD*2)/(margins.length+1);
  const mBarW = 40;
  const mBars = margins.map((m,i)=>{
    const bH = (m/maxM)*(mH-mPAD*2);
    const x = mPAD+(i+1)*mGapX - mBarW/2;
    const y = mH-mPAD-bH;
    return `<rect x="${x}" y="${y}" width="${mBarW}" height="${bH}" fill="${m>20?'#e74c3c':m>10?'#F5A623':'#2ecc71'}" rx="4" opacity="0.85"/>
      <text x="${x+mBarW/2}" y="${y-4}" text-anchor="middle" fill="#ccc" font-size="11" font-weight="bold">-${m}</text>
      <text x="${x+mBarW/2}" y="${mH-8}" text-anchor="middle" fill="#666" font-size="10">R${GAMES[i].round} vs ${GAMES[i].opponent.slice(0,3)}</text>`;
  }).join('');
  const marginSvg = `<svg viewBox="0 0 ${mW} ${mH}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <rect width="${mW}" height="${mH}" fill="#13131f" rx="8"/>
    <line x1="${mPAD}" y1="${mH-mPAD}" x2="${mW-mPAD}" y2="${mH-mPAD}" stroke="#333" stroke-width="1"/>
    ${mBars}
    <text x="${mW/2}" y="16" text-anchor="middle" fill="#888" font-size="11">Losing Margin by Round (smaller is better)</text>
  </svg>`;

  // ── Position group analysis from PLAYERS data ──
  const fwdPos = ['PR','HK','2R','LK','INT','HB/LK'];
  const bkPos  = ['FB','WG','CT','FE','HB'];
  function groupStats(posArr) {
    const pp = PLAYERS.filter(p => posArr.includes(p.pos));
    const rm   = pp.reduce((a,p)=>a+p.rm.reduce((x,y)=>x+y,0), 0);
    const tries = pp.reduce((a,p)=>a+p.tries.reduce((x,y)=>x+y,0), 0);
    const tck  = pp.reduce((a,p)=>a+p.tck.reduce((x,y)=>x+y,0), 0);
    const miss = pp.reduce((a,p)=>a+p.missed.reduce((x,y)=>x+y,0), 0);

// RENDER PLAYERS
// ============================================================
function renderPlayers() {
  const el = document.getElementById('panel-players');
  if (el.dataset.rendered) return;
  el.dataset.rendered = '1';

  const maxRM = Math.max(...PLAYERS.map(p => p.rm.reduce((a,b)=>a+b,0)));
  const maxTck = 61; // Zali Waihape

  function effColor(e) {
    if (e >= 88) return '#2ecc71';
    if (e >= 78) return '#F5A623';
    return '#e74c3c';
  }

  function pCard(p) {
    const totalRM = p.rm.reduce((a,b)=>a+b,0);
    const totalTries = p.tries.reduce((a,b)=>a+b,0);
    const totalGoals = p.goals.reduce((a,b)=>a+b,0);
    const totalTck = p.tck.reduce((a,b)=>a+b,0);
    const totalMissed = p.missed.reduce((a,b)=>a+b,0);
    const seasonEff = (totalTck/(totalTck+totalMissed)*100).toFixed(1);
    const totalKM = p.km.reduce((a,b)=>a+b,0);
    const ec = effColor(parseFloat(seasonEff));
    const posCol = POS_COLOR[p.pos] || '#7F8C8D';
    const posText = posCol === '#F5C400' ? '#000' : '#fff';

    // Round pills
    const pills = [1,2,3,4,5,6].map(r => {
      const played = p.rounds.includes(r);
      const bg = played ? 'var(--gold)' : 'rgba(255,255,255,.08)';
      const col = played ? '#000' : 'rgba(255,255,255,.2)';
      return `<span class="rpill" style="background:${bg};color:${col};">R${r}</span>`;
    }).join('');

    // Mini bar chart for run metres per round
    const maxRoundRM = Math.max(...p.rm, 1);
    const barColors = ['#3498DB','#F5C400','#1ABC9C','#9B59B6','#E74C3C','#E67E22'];
    const rrBars = p.rm.map((v,i) => {
      const played = p.rounds.includes(i+1);
      const hPct = played ? Math.max(Math.round(v/maxRoundRM*100), 8) : 6;
      const bg = played ? barColors[i] : 'rgba(255,255,255,.07)';
      return `<div class="mini-bar-col">
        <div style="font-size:10px;color:var(--muted);">${played ? v+'m' : '-'}</div>
        <div class="mini-bar-bar" style="height:${hPct}%;background:${bg};width:100%;border-radius:3px 3px 0 0;min-height:4px;"></div>
        <div style="font-size:9px;color:var(--muted);">R${i+1}</div>
      </div>`;
    }).join('');

    // Eff bar per round
    const effBars = p.eff.map((v,i) => {
      const played = p.rounds.includes(i+1);
      const hPct = played ? Math.max(Math.round(v), 6) : 6;
      const bg = played ? effColor(v) : 'rgba(255,255,255,.07)';
      return `<div class="mini-bar-col">
        <div style="font-size:10px;color:var(--muted);">${played ? Math.round(v)+'%' : '-'}</div>
        <div class="mini-bar-bar" style="height:${hPct}%;background:${bg};width:100%;border-radius:3px 3px 0 0;min-height:4px;"></div>
        <div style="font-size:9px;color:var(--muted);">R${i+1}</div>
      </div>`;
    }).join('');

    const rmBarW = Math.round(totalRM/maxRM*100);
    const tckBarW = Math.round(totalTck/maxTck*100);

    return `
    <div class="player-card" style="border-left:4px solid ${posCol};">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div class="jersey-num" style="background:${posCol};color:${posText};">#${p.num}</div>
        <div style="flex:1;min-width:140px;">
          <div class="player-name-big">${p.name}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;">
            <span class="pos-badge-p" style="background:${posCol}25;border:1px solid ${posCol}60;color:${posCol};">${p.pos}</span>
            <div>${pills}</div>
            <span style="font-size:11px;color:var(--muted);">${p.rounds.length} games played</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <div class="pstat">
            <div class="pstat-val" style="color:var(--gold);">${totalRM}m</div>
            <div class="pstat-lbl">Run Metres</div>
          </div>
          <div class="pstat">
            <div class="pstat-val" style="color:var(--green);">${totalTries}${totalGoals>0?'<span style="font-size:13px;color:var(--muted)"> +'+totalGoals+'g</span>':''}</div>
            <div class="pstat-lbl">${totalGoals>0?'Tries / Goals':'Tries'}</div>
          </div>
          <div class="pstat">
            <div class="pstat-val">${totalTck}</div>
            <div class="pstat-lbl">Tackles</div>
          </div>
          <div class="pstat">
            <div class="pstat-val" style="color:${ec};">${seasonEff}%</div>
            <div class="pstat-lbl">Tackle Eff</div>
          </div>
          ${totalKM>0?`<div class="pstat"><div class="pstat-val" style="color:#9B59B6;">${totalKM}m</div><div class="pstat-lbl">Kick Metres</div></div>`:''}
        </div>
      </div>

      <div class="player-inner-grid">
        <div>
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Season Metrics</div>
          <div class="bar-row">
            <div class="bar-label" style="width:110px;">Run Metres</div>
            <div class="bar-bg"><div class="bar-fill" style="width:${rmBarW}%;background:var(--gold);"></div></div>
            <div class="bar-val" style="color:var(--gold);">${totalRM}m</div>
          </div>
          <div class="bar-row">
            <div class="bar-label" style="width:110px;">Tackle Eff.</div>
            <div class="bar-bg"><div class="bar-fill" style="width:${seasonEff}%;background:${ec};"></div></div>
            <div class="bar-val" style="color:${ec};">${seasonEff}%</div>
          </div>
          <div class="bar-row">
            <div class="bar-label" style="width:110px;">Tackles</div>
            <div class="bar-bg"><div class="bar-fill" style="width:${tckBarW}%;background:#3498DB;"></div></div>
            <div class="bar-val" style="color:#3498DB;">${totalTck}</div>
          </div>
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:12px 0 6px;">Tackle Eff. Per Round</div>
          <div class="mini-bar-wrap">${effBars}</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Run Metres Per Round</div>
          <div class="mini-bar-wrap">${rrBars}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
            <div style="background:var(--card);border-radius:8px;padding:8px;text-align:center;">
              <div style="font-size:16px;font-weight:900;color:var(--gold);">${(totalRM/p.rounds.length).toFixed(0)}m</div>
              <div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:2px;">Avg RM/Game</div>
            </div>
            <div style="background:var(--card);border-radius:8px;padding:8px;text-align:center;">
