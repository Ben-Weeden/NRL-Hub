<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Seagulls Tracker">
<link rel="apple-touch-icon" href="icon-w.png">
<title>Tweed Seagulls — BMD Set Tracker 2026</title>
<style>
:root{--blue:#004BA0;--gold:#F5C400;--dark:#0a0a12;--card:#13131f;--card2:#1a1a2a;--border:#222236;--text:#e8e8f0;--muted:#888aaa;--green:#2ecc71;--red:#e74c3c;--amber:#f39c12;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
.hero{background:linear-gradient(135deg,#001a3a 0%,#003070 50%,#001a3a 100%);padding:28px 20px;text-align:center;border-bottom:2px solid var(--blue);}
.hero-badge{display:inline-block;background:rgba(0,75,160,.3);border:1px solid var(--blue);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.hero h1{font-size:clamp(18px,4vw,34px);font-weight:900;color:#fff;letter-spacing:-0.5px;}
.hero h1 span{color:var(--gold);}
.hero-sub{color:var(--muted);font-size:13px;margin-top:4px;}
.hero-stats{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:20px;}
.hs{background:rgba(0,75,160,.15);border:1px solid rgba(0,75,160,.3);border-radius:10px;padding:10px 16px;text-align:center;}
.hs-val{font-size:22px;font-weight:900;color:var(--gold);}
.hs-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.nav{display:flex;background:#0d0d1a;border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:0;z-index:100;}
.tab-btn{padding:13px 16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:.5px;transition:all .2s;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--blue);}
.panel{display:none;padding:20px;max-width:900px;margin:0 auto;}
.panel.active{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;}
.card-title{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title::after{content:'';flex:1;height:1px;background:var(--border);}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.metric-box{background:var(--card2);border-radius:10px;padding:14px;text-align:center;}
.metric-val{font-size:26px;font-weight:900;}
.metric-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.metric-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.bar-wrap{margin-bottom:10px;}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
.bar-track{height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .3s;}
.rd-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.rd-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.rd-title{font-size:14px;font-weight:700;}
.rd-result{font-size:12px;padding:3px 10px;border-radius:6px;font-weight:700;}
.win{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3);}
.loss{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.3);}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--card);color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px;text-align:center;border-bottom:1px solid var(--border);}
.tbl th:first-child{text-align:left;padding-left:10px;}
.tbl td{padding:8px;text-align:center;border-bottom:1px solid rgba(34,34,54,.4);}
.tbl td:first-child{text-align:left;padding-left:10px;font-weight:600;}
.good{color:#2ecc71;font-weight:700;}
.warn{color:#f39c12;font-weight:700;}
.bad{color:#e74c3c;font-weight:700;}
.tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;}
.tag-h{background:rgba(0,75,160,.2);color:#5b9bd5;border:1px solid rgba(0,75,160,.4);}
.tag-a{background:rgba(245,196,0,.15);color:var(--gold);border:1px solid rgba(245,196,0,.3);}
.pending{opacity:.45;font-style:italic;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">BMD PREMIERSHIP 2026</div>
  <h1>Tweed Seagulls <span>Set Tracker</span></h1>
  <div class="hero-sub">Completion Rate · Penalties · Errors — R1 to R11</div>
  <div class="hero-stats">
    <div class="hs"><div class="hs-val">70.2%</div><div class="hs-lbl">Season Comp%</div></div>
    <div class="hs"><div class="hs-val">3</div><div class="hs-lbl">Rounds Logged</div></div>
    <div class="hs"><div class="hs-val">32</div><div class="hs-lbl">Avg Sets/Game</div></div>
    <div class="hs"><div class="hs-val">10.7</div><div class="hs-lbl">Avg Errors</div></div>
  </div>
</div>

<nav class="nav">
  <button class="tab-btn active" onclick="showTab('overview')">📊 Overview</button>
  <button class="tab-btn" onclick="showTab('rounds')">📅 By Round</button>
  <button class="tab-btn" onclick="showTab('trends')">📈 Trends</button>
</nav>

<div id="panel-overview" class="panel active"></div>
<div id="panel-rounds" class="panel"></div>
<div id="panel-trends" class="panel"></div>

<script>
const ROUNDS = [
  {rd:1, opp:'Western Clydesdales', venue:'H', result:'L', score:'12-26',
   h1cs:15, h2cs:8, totalcs:23, h1ncs:5, h2ncs:5, totalncs:10,
   h1tot:20, h2tot:13, tot:33,
   h1comp:75.0, h2comp:61.5, comp:69.7,
   penFor:11, penAg:9, errors:12},
  {rd:2, opp:'Northern Pride', venue:'H', result:'L', score:'14-24',
   h1cs:11, h2cs:13, totalcs:24, h1ncs:5, h2ncs:4, totalncs:9,
   h1tot:16, h2tot:17, tot:33,
   h1comp:68.8, h2comp:76.5, comp:72.7,
   penFor:10, penAg:11, errors:9},
  {rd:3, opp:'Ipswich Jets', venue:'A', result:'L', score:'6-34',
   h1cs:10, h2cs:9, totalcs:19, h1ncs:7, h2ncs:2, totalncs:9,
   h1tot:17, h2tot:11, tot:28,
   h1comp:58.8, h2comp:81.8, comp:67.9,
   penFor:7, penAg:10, errors:11},
  {rd:4, opp:'Burleigh Bears', venue:'A', result:'L', score:'4-34', pending:true,
   h1comp:92, h2comp:81, comp:88, errors:5, penAg:8},
  {rd:5, opp:'Brisbane Tigers', venue:'H', result:'—', score:'TBC', pending:true},
  {rd:6, opp:'Wynnum Manly Seagulls', venue:'H', result:'—', score:'TBC', pending:true},
  {rd:7, opp:'CQ Capras', venue:'A', result:'—', score:'TBC', pending:true},
  {rd:8, opp:'Souths Logan Magpies', venue:'A', result:'—', score:'TBC', pending:true},
  {rd:9, opp:'Mackay Cutters', venue:'A', result:'—', score:'TBC', pending:true},
  {rd:10, opp:'Sunshine Coast Falcons', venue:'A', result:'—', score:'TBC', pending:true},
  {rd:11, opp:'Norths Devils', venue:'A', result:'—', score:'TBC', pending:true},
];

const logged = ROUNDS.filter(r=>!r.pending || r.comp);

function pct(v){return typeof v==='number'?v.toFixed(1)+'%':'-';}
function compCol(v){return v>=75?'var(--green)':v>=65?'var(--amber)':'var(--red)';}

function showTab(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  ['overview','rounds','trends'].forEach((t,i)=>{ if(t===id) document.querySelectorAll('.tab-btn')[i].classList.add('active'); });
  const renders={overview:renderOverview,rounds:renderRounds,trends:renderTrends};
  renders[id]();
}

function renderOverview(){
  const el=document.getElementById('panel-overview');
  if(el.innerHTML.trim()) return;

  const r1=ROUNDS[0], r2=ROUNDS[1], r3=ROUNDS[2];
  const avgs={comp:70.2, h1:67.5, h2:73.3, errors:10.7, penAg:10.0, penFor:9.3};

  el.innerHTML=`
  <div class="card">
    <div class="card-title">📋 Season Completion — 3 Rounds Logged</div>
    <div class="grid-3" style="margin-bottom:16px;">
      <div class="metric-box">
        <div class="metric-val" style="color:${compCol(avgs.comp)}">${avgs.comp}%</div>
        <div class="metric-lbl">Season Avg</div>
        <div class="metric-sub">Target: 70%+</div>
      </div>
      <div class="metric-box">
        <div class="metric-val" style="color:${compCol(avgs.h1)}">${avgs.h1}%</div>
        <div class="metric-lbl">H1 Average</div>
        <div class="metric-sub">Needs improvement</div>
      </div>
      <div class="metric-box">
        <div class="metric-val" style="color:${compCol(avgs.h2)}">${avgs.h2}%</div>
        <div class="metric-lbl">H2 Average</div>
        <div class="metric-sub">Better in 2nd half</div>
      </div>
    </div>
    ${[r1,r2,r3].map(r=>`
    <div class="bar-wrap">
      <div class="bar-label">
        <span>R${r.rd} vs ${r.opp} <span class="tag ${r.venue==='H'?'tag-h':'tag-a'}">${r.venue}</span></span>
        <span style="color:${compCol(r.comp)};font-weight:700;">${pct(r.comp)}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${r.comp}%;background:${compCol(r.comp)};"></div></div>
      <div style="display:flex;gap:16px;font-size:10px;color:var(--muted);margin-top:3px;">
        <span>H1: <strong style="color:${compCol(r.h1comp)}">${pct(r.h1comp)}</strong></span>
        <span>H2: <strong style="color:${compCol(r.h2comp)}">${pct(r.h2comp)}</strong></span>
        <span>Sets: ${r.totalcs}/${r.tot}</span>
      </div>
    </div>`).join('')}
    <div style="padding:10px 12px;background:rgba(245,196,0,.06);border-radius:8px;font-size:12px;color:var(--muted);margin-top:8px;">
      📌 <strong style="color:var(--gold);">Key pattern:</strong> H2 completion (73.3%) consistently beats H1 (67.5%). Flipping this trend — starting strong — is the single biggest discipline improvement available.
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">⚠️ Penalties Against</div>
      ${[r1,r2,r3].map(r=>{
        const col=r.penAg<=7?'var(--green)':r.penAg<=9?'var(--amber)':'var(--red)';
        return`<div class="bar-wrap">
          <div class="bar-label"><span>R${r.rd} vs ${r.opp}</span><span style="color:${col};font-weight:700;">${r.penAg}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${r.penAg/15*100}%;background:${col};"></div></div>
        </div>`;
      }).join('')}
      <div style="margin-top:8px;font-size:11px;color:var(--muted);">Avg: <strong style="color:var(--amber);">${avgs.penAg}</strong>/game · Target: ≤7</div>
    </div>
    <div class="card">
      <div class="card-title">❌ Errors</div>
      ${[r1,r2,r3].map(r=>{
        const col=r.errors<=8?'var(--green)':r.errors<=10?'var(--amber)':'var(--red)';
        return`<div class="bar-wrap">
          <div class="bar-label"><span>R${r.rd} vs ${r.opp}</span><span style="color:${col};font-weight:700;">${r.errors}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${r.errors/15*100}%;background:${col};"></div></div>
        </div>`;
      }).join('')}
      <div style="margin-top:8px;font-size:11px;color:var(--muted);">Avg: <strong style="color:var(--red);">${avgs.errors}</strong>/game · Target: ≤8</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 Full Comparison Table</div>
    <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr>
        <th>Round</th><th>Venue</th><th>H1 Comp%</th><th>H2 Comp%</th><th>Total%</th><th>Sets</th><th>Pen Ag</th><th>Errors</th><th>Score</th>
      </tr></thead>
      <tbody>
      ${ROUNDS.filter(r=>r.comp).map(r=>`<tr ${r.pending?'class="pending"':''}>
        <td>R${r.rd} vs ${r.opp}</td>
        <td><span class="tag ${r.venue==='H'?'tag-h':'tag-a'}">${r.venue}</span></td>
        <td style="color:${compCol(r.h1comp)};font-weight:700;">${r.h1comp ? pct(r.h1comp) : '—'}</td>
        <td style="color:${compCol(r.h2comp)};font-weight:700;">${r.h2comp ? pct(r.h2comp) : '—'}</td>
        <td style="color:${compCol(r.comp)};font-weight:700;">${pct(r.comp)}</td>
        <td>${r.totalcs!=null?r.totalcs+'/'+(r.tot||'?'):'—'}</td>
        <td style="color:${r.penAg<=7?'var(--green)':r.penAg<=9?'var(--amber)':'var(--red)'};">${r.penAg!=null?r.penAg:'—'}</td>
        <td style="color:${r.errors<=8?'var(--green)':r.errors<=10?'var(--amber)':'var(--red)'};">${r.errors!=null?r.errors:'—'}</td>
        <td>${r.score}</td>
      </tr>`).join('')}
      </tbody>
    </table>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--muted);">R4 comp% sourced from analytics — full set breakdown pending entry into tracker.</div>
  </div>`;
}

function renderRounds(){
  const el=document.getElementById('panel-rounds');
  if(el.innerHTML.trim()) return;
  el.innerHTML=ROUNDS.map(r=>{
    if(!r.comp && !r.h1comp) return `<div class="rd-card pending">
      <div class="rd-header">
        <div>
          <div class="rd-title">R${r.rd} — ${r.opp} <span class="tag ${r.venue==='H'?'tag-h':'tag-a'}">${r.venue}</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px;">Data not yet entered</div>
        </div>
        <div class="rd-result" style="background:rgba(136,138,170,.1);color:var(--muted);border:1px solid rgba(136,138,170,.2);">UPCOMING</div>
      </div>
    </div>`;

    const rCol=r.result==='W'?'win':r.result==='L'?'loss':'';
    return `<div class="rd-card">
      <div class="rd-header">
        <div>
          <div class="rd-title">R${r.rd} — ${r.opp} <span class="tag ${r.venue==='H'?'tag-h':'tag-a'}">${r.venue}</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">${r.score}${r.pending?' · Full set breakdown pending':''}</div>
        </div>
        <div class="rd-result ${rCol}">${r.result==='W'?'✅ WIN':r.result==='L'?'❌ LOSS':'—'}</div>
      </div>
      <div class="grid-3" style="margin-bottom:12px;">
        <div class="metric-box">
          <div class="metric-val" style="color:${compCol(r.h1comp||0)}">${r.h1comp!=null?r.h1comp+'%':'—'}</div>
          <div class="metric-lbl">H1 Comp%</div>
          ${r.h1cs!=null?`<div class="metric-sub">${r.h1cs}/${r.h1tot} sets</div>`:''}
        </div>
        <div class="metric-box">
          <div class="metric-val" style="color:${compCol(r.h2comp||0)}">${r.h2comp!=null?r.h2comp+'%':'—'}</div>
          <div class="metric-lbl">H2 Comp%</div>
          ${r.h2cs!=null?`<div class="metric-sub">${r.h2cs}/${r.h2tot} sets</div>`:''}
        </div>
        <div class="metric-box">
          <div class="metric-val" style="color:${compCol(r.comp||0)}">${r.comp!=null?r.comp+'%':'—'}</div>
          <div class="metric-lbl">Total Comp%</div>
          ${r.totalcs!=null?`<div class="metric-sub">${r.totalcs}/${r.tot} sets</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        ${r.penFor!=null?`<div style="background:var(--card);border-radius:8px;padding:8px 14px;text-align:center;flex:1;min-width:80px;"><div style="font-size:18px;font-weight:900;color:var(--green);">${r.penFor}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">PEN FOR</div></div>`:''}
        ${r.penAg!=null?`<div style="background:var(--card);border-radius:8px;padding:8px 14px;text-align:center;flex:1;min-width:80px;"><div style="font-size:18px;font-weight:900;color:${r.penAg<=7?'var(--green)':r.penAg<=9?'var(--amber)':'var(--red)'};">${r.penAg}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">PEN AGAINST</div></div>`:''}
        ${r.errors!=null?`<div style="background:var(--card);border-radius:8px;padding:8px 14px;text-align:center;flex:1;min-width:80px;"><div style="font-size:18px;font-weight:900;color:${r.errors<=8?'var(--green)':r.errors<=10?'var(--amber)':'var(--red)'};">${r.errors}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">ERRORS</div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderTrends(){
  const el=document.getElementById('panel-trends');
  if(el.innerHTML.trim()) return;
  const logged=ROUNDS.filter(r=>r.comp!=null);
  const W=560,H=180,PAD=40,LW=W-PAD*2;
  const step=logged.length>1?LW/(logged.length-1):LW;
  function py(v,mn,mx){return PAD+(1-(v-mn)/(mx-mn||1))*(H-PAD*2);}
  const comps=logged.map(r=>r.comp);
  const h1s=logged.filter(r=>r.h1comp!=null).map(r=>r.h1comp);
  const h2s=logged.filter(r=>r.h2comp!=null).map(r=>r.h2comp);
  const mn=Math.min(...comps,...h1s,...h2s)-5, mx=Math.max(...comps,...h1s,...h2s)+5;
  function line(arr,col){
    const pts=arr.map((v,i)=>`${PAD+i*step},${py(v,mn,mx)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round"/>
    ${arr.map((v,i)=>`<circle cx="${PAD+i*step}" cy="${py(v,mn,mx)}" r="4" fill="${col}"/>
    <text x="${PAD+i*step}" y="${py(v,mn,mx)-8}" text-anchor="middle" fill="${col}" font-size="9.5" font-weight="700">${v.toFixed(0)}%</text>`).join('')}`;
  }
  const svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <rect width="${W}" height="${H}" fill="#13131f" rx="8"/>
    <line x1="${PAD}" y1="${py(70,mn,mx)}" x2="${W-PAD}" y2="${py(70,mn,mx)}" stroke="rgba(245,196,0,.3)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${W-PAD+4}" y="${py(70,mn,mx)+4}" fill="rgba(245,196,0,.5)" font-size="9">70%</text>
    ${line(comps,'#5b9bd5')}
    ${logged.filter(r=>r.h1comp!=null).length>1?line(h1s,'#e74c3c'):''}
    ${logged.filter(r=>r.h2comp!=null).length>1?line(h2s,'#2ecc71'):''}
    ${logged.map((r,i)=>`<text x="${PAD+i*step}" y="${H-6}" text-anchor="middle" fill="#666" font-size="9">R${r.rd}</text>`).join('')}
  </svg>`;

  el.innerHTML=`
  <div class="card">
    <div class="card-title">📈 Completion % Trend</div>
    ${svg}
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:11px;">
      <span style="color:#5b9bd5;">● Total comp%</span>
      <span style="color:#e74c3c;">● H1 comp%</span>
      <span style="color:#2ecc71;">● H2 comp%</span>
      <span style="color:rgba(245,196,0,.6);">— — 70% target</span>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">🔑 H1 vs H2 Pattern</div>
      ${logged.filter(r=>r.h1comp!=null).map(r=>`
      <div style="margin-bottom:10px;">
        <div style="font-size:12px;font-weight:700;margin-bottom:5px;">R${r.rd} — ${r.opp}</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="font-size:10px;color:var(--muted);width:22px;">H1</span>
          <div style="flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${r.h1comp}%;background:${compCol(r.h1comp)};border-radius:4px;"></div></div>
          <span style="font-size:11px;font-weight:700;color:${compCol(r.h1comp)};min-width:38px;">${r.h1comp}%</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:3px;">
          <span style="font-size:10px;color:var(--muted);width:22px;">H2</span>
          <div style="flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${r.h2comp}%;background:${compCol(r.h2comp)};border-radius:4px;"></div></div>
          <span style="font-size:11px;font-weight:700;color:${compCol(r.h2comp)};min-width:38px;">${r.h2comp}%</span>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px;">${r.h2comp>r.h1comp?'↑ Improved in H2':'↓ Faded in H2'}</div>
      </div>`).join('')}
      <div style="padding:8px 10px;background:rgba(231,76,60,.07);border-radius:8px;font-size:11px;color:var(--muted);margin-top:4px;">
        ⚠️ Tweed start below 70% in H1 every round. Fixing the first 10 minutes is the biggest single gain available.
      </div>
    </div>
    <div class="card">
      <div class="card-title">🎯 Win Conditions Tracker</div>
      ${[
        {label:'Completion ≥70%',rounds:[{r:1,met:false},{r:2,met:true},{r:3,met:false},{r:4,met:true}]},
        {label:'Errors ≤8',rounds:[{r:1,met:false},{r:2,met:false},{r:3,met:false},{r:4,met:true}]},
        {label:'Penalties ≤7',rounds:[{r:1,met:false},{r:2,met:false},{r:3,met:true},{r:4,met:false}]},
      ].map(wc=>`<div style="margin-bottom:12px;">
        <div style="font-size:12px;font-weight:700;margin-bottom:5px;">${wc.label}</div>
        <div style="display:flex;gap:6px;">
          ${wc.rounds.map(r=>`<div style="flex:1;text-align:center;padding:5px 0;border-radius:6px;font-size:10px;font-weight:700;background:${r.met?'rgba(46,204,113,.15)':'rgba(231,76,60,.1)'};color:${r.met?'#2ecc71':'#e74c3c'};border:1px solid ${r.met?'rgba(46,204,113,.3)':'rgba(231,76,60,.2)'};">R${r.r}<br>${r.met?'✅':'❌'}</div>`).join('')}
        </div>
      </div>`).join('')}
      <div style="padding:8px 10px;background:rgba(0,75,160,.08);border-radius:8px;font-size:11px;color:var(--muted);">
        📌 R4 was the first round errors dropped to target (5). Never yet met all 3 conditions in the same game.
      </div>
    </div>
  </div>`;
}

renderOverview();
</script>
</body>
</html>
