<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Seagulls Tracker">
<link rel="apple-touch-icon" href="icon-w.png">
<title>Tweed Seagulls — BMD Set Tracker 2026</title>
<style>
:root{--blue:#004BA0;--gold:#F5C400;--dark:#0a0a12;--card:#13131f;--card2:#1a1a2a;--border:#222236;--text:#e8e8f0;--muted:#888aaa;--green:#2ecc71;--red:#e74c3c;--amber:#f39c12;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
.hero{background:linear-gradient(135deg,#001a3a 0%,#003070 50%,#001a3a 100%);padding:24px 20px;text-align:center;border-bottom:2px solid var(--blue);}
.hero-badge{display:inline-block;background:rgba(0,75,160,.3);border:1px solid var(--blue);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.hero h1{font-size:clamp(16px,4vw,30px);font-weight:900;color:#fff;}
.hero h1 span{color:var(--gold);}
.hero-sub{color:var(--muted);font-size:12px;margin-top:4px;}
.hero-stats{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:16px;}
.hs{background:rgba(0,75,160,.15);border:1px solid rgba(0,75,160,.3);border-radius:10px;padding:8px 14px;text-align:center;}
.hs-val{font-size:20px;font-weight:900;color:var(--gold);}
.hs-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}
.nav{display:flex;background:#0d0d1a;border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:0;z-index:100;}
.tab-btn{padding:12px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:.5px;transition:all .2s;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--blue);}
.panel{display:none;padding:16px;max-width:900px;margin:0 auto;}
.panel.active{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title::after{content:'';flex:1;height:1px;background:var(--border);}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;}
.metric-box{background:var(--card2);border-radius:10px;padding:12px;text-align:center;}
.metric-val{font-size:24px;font-weight:900;}
.metric-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.metric-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.bar-wrap{margin-bottom:9px;}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
.bar-track{height:9px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;}
.rd-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.rd-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.rd-title{font-size:13px;font-weight:700;}
.rd-result{font-size:11px;padding:3px 10px;border-radius:6px;font-weight:700;}
.win{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3);}
.loss{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.3);}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--card);color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:7px;text-align:center;border-bottom:1px solid var(--border);}
.tbl th:first-child{text-align:left;padding-left:10px;}
.tbl td{padding:7px;text-align:center;border-bottom:1px solid rgba(34,34,54,.4);}
.tbl td:first-child{text-align:left;padding-left:10px;font-weight:600;}
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;}
.tag-h{background:rgba(0,75,160,.2);color:#5b9bd5;border:1px solid rgba(0,75,160,.4);}
.tag-a{background:rgba(245,196,0,.15);color:var(--gold);border:1px solid rgba(245,196,0,.3);}
.pending{opacity:.4;font-style:italic;}

/* Entry form */
.form-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;}
.form-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-group label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.form-group input, .form-group select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 10px;font-size:13px;font-family:inherit;outline:none;}
.form-group input:focus, .form-group select:focus{border-color:var(--blue);}
.form-group select option{background:#1a1a2a;}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px 24px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;letter-spacing:.5px;}
.btn-primary:hover{background:#0060cc;}
.btn-clear{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.3);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;}
.save-notice{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#2ecc71;margin-top:10px;display:none;}
.rd-select-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.rd-select-btn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--muted);}
.rd-select-btn.has-data{border-color:rgba(46,204,113,.4);color:#2ecc71;}
.rd-select-btn.active{border-color:var(--blue);background:rgba(0,75,160,.2);color:#fff;}
.calc-preview{background:var(--card2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);margin-top:8px;margin-bottom:4px;}
.calc-preview span{color:var(--text);font-weight:700;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">BMD PREMIERSHIP 2026</div>
  <h1>Tweed Seagulls <span>Set Tracker</span></h1>
  <div class="hero-sub">Completion Rate · Penalties · Errors — Live Entry</div>
  <div class="hero-stats" id="hero-stats"></div>
</div>

<nav class="nav">
  <button class="tab-btn active" onclick="showTab('overview')">📊 Overview</button>
  <button class="tab-btn" onclick="showTab('rounds')">📅 By Round</button>
  <button class="tab-btn" onclick="showTab('trends')">📈 Trends</button>
  <button class="tab-btn" onclick="showTab('enter')">✏️ Enter Data</button>
</nav>

<div id="panel-overview" class="panel active"></div>
<div id="panel-rounds" class="panel"></div>
<div id="panel-trends" class="panel"></div>
<div id="panel-enter" class="panel"></div>

<script type="module">
// ── Base data (hardcoded) ──────────────────────────────────────────────────
const BASE = [
  {rd:1, opp:'Western Clydesdales', venue:'H', result:'L', score:'12-26',
   h1cs:15,h2cs:8,totalcs:23,h1ncs:5,h2ncs:5,totalncs:10,h1tot:20,h2tot:13,tot:33,
   h1comp:75.0,h2comp:61.5,comp:69.7,penFor:11,penAg:9,errors:12},
  {rd:2, opp:'Northern Pride', venue:'H', result:'L', score:'14-24',
   h1cs:11,h2cs:13,totalcs:24,h1ncs:5,h2ncs:4,totalncs:9,h1tot:16,h2tot:17,tot:33,
   h1comp:68.8,h2comp:76.5,comp:72.7,penFor:10,penAg:11,errors:9},
  {rd:3, opp:'Ipswich Jets', venue:'A', result:'L', score:'6-34',
   h1cs:10,h2cs:9,totalcs:19,h1ncs:7,h2ncs:2,totalncs:9,h1tot:17,h2tot:11,tot:28,
   h1comp:58.8,h2comp:81.8,comp:67.9,penFor:7,penAg:10,errors:11},
  {rd:4, opp:'Burleigh Bears', venue:'A', result:'L', score:'4-34',
   h1cs:13,h2cs:9,totalcs:22,h1ncs:1,h2ncs:2,totalncs:3,h1tot:14,h2tot:11,tot:25,
   h1comp:92.9,h2comp:81.8,comp:88.0,penFor:3,penAg:8,errors:5},
  {rd:5, opp:'Brisbane Tigers', venue:'H', result:'L', score:'14-38',
   h1cs:8,h2cs:17,totalcs:25,h1ncs:5,h2ncs:4,totalncs:9,h1tot:13,h2tot:21,tot:34,
   h1comp:61.5,h2comp:81.0,comp:73.5,penFor:4,penAg:5,errors:11},
  {rd:6, opp:'Wynnum Manly', venue:'H'},
  {rd:7, opp:'CQ Capras', venue:'A'},
  {rd:8, opp:'Souths Logan', venue:'A'},
  {rd:9, opp:'Mackay Cutters', venue:'A'},
  {rd:10, opp:'SC Falcons', venue:'A'},
  {rd:11, opp:'Norths Devils', venue:'A'},
];

// ── Firebase / Firestore persistence ──────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const _fbApp = initializeApp({
  apiKey: "AIzaSyD7I_oqAtJ_EBfvFZMxiDoaWukuuePZEK8",
  authDomain: "tweed-seagulls-tracker.firebaseapp.com",
  projectId: "tweed-seagulls-tracker",
  storageBucket: "tweed-seagulls-tracker.firebasestorage.app",
  messagingSenderId: "857208470048",
  appId: "1:857208470048:web:1a3953e994e0db4bed5a45"
});
const _db  = getFirestore(_fbApp);
const _ref = doc(_db, 'tracker', 'bmd_2026');

// In-memory cache — keeps all functions synchronous after initial load
let _cache = {};

async function _initFirestore(){
  const snap = await getDoc(_ref);
  if(snap.exists()) _cache = snap.data().rounds || {};
  // Real-time listener — any device save updates every open tab/device instantly
  onSnapshot(_ref, snap => {
    if(snap.exists()){
      _cache = snap.data().rounds || {};
      updateHero();
      // Refresh any open entry form
      const activeRd = document.querySelector('.rd-select-btn.active');
      if(activeRd) renderEntryForm(parseInt(activeRd.dataset.rd));
    }
  });
  updateHero();
}

function loadSaved(){ return _cache; }

function saveData(rd, obj){
  _cache['rd'+rd] = obj;
  setDoc(_ref, { rounds: _cache });
}

function clearRound(rd){
  delete _cache['rd'+rd];
  setDoc(_ref, { rounds: _cache });
}

// ── Merge saved data over base ─────────────────────────────────────────────
function getRounds(){
  const saved = loadSaved();
  return BASE.map(r => {
    const s = saved['rd'+r.rd];
    return s ? {...r, ...s} : {...r};
  });
}

function pct(v){ return typeof v==='number' ? v.toFixed(1)+'%' : '—'; }
function compCol(v){ return v>=75?'var(--green)':v>=65?'var(--amber)':'var(--red)'; }
function hasData(r){ return r.comp!=null; }

function showTab(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  const tabs=['overview','rounds','trends','enter'];
  tabs.forEach((t,i)=>{ if(t===id) document.querySelectorAll('.tab-btn')[i].classList.add('active'); });
  document.getElementById('panel-'+id).innerHTML='';
  const renders={overview:renderOverview,rounds:renderRounds,trends:renderTrends,enter:renderEnter};
  renders[id]();
}

// ── Hero stats ─────────────────────────────────────────────────────────────
function updateHero(){
  const rounds = getRounds();
  const logged = rounds.filter(hasData);
  if(!logged.length){ document.getElementById('hero-stats').innerHTML=''; return; }
  const avgComp = (logged.reduce((a,r)=>a+r.comp,0)/logged.length).toFixed(1);
  const avgErr = logged.filter(r=>r.errors!=null).length
    ? (logged.filter(r=>r.errors!=null).reduce((a,r)=>a+r.errors,0)/logged.filter(r=>r.errors!=null).length).toFixed(1)
    : '—';
  const avgPenAg = logged.filter(r=>r.penAg!=null).length
    ? (logged.filter(r=>r.penAg!=null).reduce((a,r)=>a+r.penAg,0)/logged.filter(r=>r.penAg!=null).length).toFixed(1)
    : '—';
  document.getElementById('hero-stats').innerHTML=`
    <div class="hs"><div class="hs-val">${avgComp}%</div><div class="hs-lbl">Season Comp%</div></div>
    <div class="hs"><div class="hs-val">${logged.length}</div><div class="hs-lbl">Rounds Logged</div></div>
    <div class="hs"><div class="hs-val">${avgErr}</div><div class="hs-lbl">Avg Errors</div></div>
    <div class="hs"><div class="hs-val">${avgPenAg}</div><div class="hs-lbl">Avg Pen Ag</div></div>`;
}

// ── Overview ───────────────────────────────────────────────────────────────
function renderOverview(){
  const el=document.getElementById('panel-overview');
  const rounds=getRounds(), logged=rounds.filter(hasData);
  if(!logged.length){
    el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--muted);">No data yet. Use the ✏️ Enter Data tab to add rounds.</div>';
    return;
  }
  const avgComp=(logged.reduce((a,r)=>a+r.comp,0)/logged.length).toFixed(1);
  const h1logged=logged.filter(r=>r.h1comp!=null);
  const h2logged=logged.filter(r=>r.h2comp!=null);
  const avgH1=h1logged.length?(h1logged.reduce((a,r)=>a+r.h1comp,0)/h1logged.length).toFixed(1):'—';
  const avgH2=h2logged.length?(h2logged.reduce((a,r)=>a+r.h2comp,0)/h2logged.length).toFixed(1):'—';
  const errL=logged.filter(r=>r.errors!=null);
  const penL=logged.filter(r=>r.penAg!=null);
  const avgErr=errL.length?(errL.reduce((a,r)=>a+r.errors,0)/errL.length).toFixed(1):'—';
  const avgPen=penL.length?(penL.reduce((a,r)=>a+r.penAg,0)/penL.length).toFixed(1):'—';

  el.innerHTML=`
  <div class="card">
    <div class="card-title">📋 Season Summary — ${logged.length} Rounds</div>
    <div class="grid-3" style="margin-bottom:14px;">
      <div class="metric-box"><div class="metric-val" style="color:${compCol(parseFloat(avgComp))}">${avgComp}%</div><div class="metric-lbl">Season Avg</div><div class="metric-sub">Target: 70%+</div></div>
      <div class="metric-box"><div class="metric-val" style="color:${avgH1!=='—'?compCol(parseFloat(avgH1)):'var(--muted)'}">${avgH1 !== '—' ? avgH1+'%' : '—'}</div><div class="metric-lbl">H1 Average</div></div>
      <div class="metric-box"><div class="metric-val" style="color:${avgH2!=='—'?compCol(parseFloat(avgH2)):'var(--muted)'}">${avgH2 !== '—' ? avgH2+'%' : '—'}</div><div class="metric-lbl">H2 Average</div></div>
    </div>
    ${logged.map(r=>`
    <div class="bar-wrap">
      <div class="bar-label">
        <span>R${r.rd} vs ${r.opp} <span class="tag ${r.venue==='H'?'tag-h':'tag-a'}">${r.venue}</span>${r.note?` <span style="font-size:10px;color:var(--muted);">*</span>`:''}</span>
        <span style="color:${compCol(r.comp)};font-weight:700;">${pct(r.comp)}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(r.comp,100)}%;background:${compCol(r.comp)};"></div></div>
      <div style="display:flex;gap:14px;font-size:10px;color:var(--muted);margin-top:2px;">
        <span>H1: <strong style="color:${r.h1comp!=null?compCol(r.h1comp):'var(--muted)'}">${r.h1comp!=null?pct(r.h1comp):'—'}</strong></span>
        <span>H2: <strong style="color:${r.h2comp!=null?compCol(r.h2comp):'var(--muted)'}">${r.h2comp!=null?pct(r.h2comp):'—'}</strong></span>
        ${r.totalcs!=null?`<span>Sets: ${r.totalcs}/${r.tot}</span>`:''}
        <span style="color:${r.result==='W'?'var(--green)':'var(--red)'};">${r.score}</span>
      </div>
    </div>`).join('')}
    ${logged.some(r=>r.note)?`<div style="font-size:10px;color:var(--muted);margin-top:6px;">* Analytics-sourced comp% — full set counts pending entry.</div>`:''}
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">⚠️ Penalties Against</div>
      ${penL.map(r=>{const col=r.penAg<=7?'var(--green)':r.penAg<=9?'var(--amber)':'var(--red)';return`
      <div class="bar-wrap">
        <div class="bar-label"><span>R${r.rd} vs ${r.opp}</span><span style="color:${col};font-weight:700;">${r.penAg}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${r.penAg/15*100}%;background:${col};"></div></div>
      </div>`}).join('')}
      <div style="margin-top:6px;font-size:11px;color:var(--muted);">Avg: <strong style="color:${parseFloat(avgPen)<=7?'var(--green)':parseFloat(avgPen)<=9?'var(--amber)':'var(--red)'};">${avgPen}</strong>/game · Target: ≤7</div>
    </div>
    <div class="card">
      <div class="card-title">❌ Errors</div>
      ${errL.map(r=>{const col=r.errors<=8?'var(--green)':r.errors<=10?'var(--amber)':'var(--red)';return`
      <div class="bar-wrap">
        <div class="bar-label"><span>R${r.rd} vs ${r.opp}</span><span style="color:${col};font-weight:700;">${r.errors}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${r.errors/15*100}%;background:${col};"></div></div>
      </div>`}).join('')}
      <div style="margin-top:6px;font-size:11px;color:var(--muted);">Avg: <strong style="color:${parseFloat(avgErr)<=8?'var(--green)':parseFloat(avgErr)<=10?'var(--amber)':'var(--red)'};">${avgErr}</strong>/game · Target: ≤8</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 Full Table</div>
    <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr><th>Round</th><th>Venue</th><th>H1%</th><th>H2%</th><th>Total%</th><th>Sets</th><th>Pen Ag</th><th>Errors</th><th>Score</th></tr></thead>
      <tbody>
      ${rounds.map(r=>`<tr ${!hasData(r)?'class="pending"':''}>
        <td>R${r.rd} vs ${r.opp}</td>
        <td><span class="tag ${r.venue==='H'?'tag-h':'tag-a'}">${r.venue}</span></td>
        <td style="color:${r.h1comp!=null?compCol(r.h1comp):'var(--muted)'};">${r.h1comp!=null?pct(r.h1comp):'—'}</td>
        <td style="color:${r.h2comp!=null?compCol(r.h2comp):'var(--muted)'};">${r.h2comp!=null?pct(r.h2comp):'—'}</td>
        <td style="color:${hasData(r)?compCol(r.comp):'var(--muted)'};">${hasData(r)?pct(r.comp):'—'}</td>
        <td>${r.totalcs!=null?r.totalcs+'/'+(r.tot||'?'):'—'}</td>
        <td style="color:${r.penAg!=null?(r.penAg<=7?'var(--green)':r.penAg<=9?'var(--amber)':'var(--red)'):'var(--muted)'};">${r.penAg!=null?r.penAg:'—'}</td>
        <td style="color:${r.errors!=null?(r.errors<=8?'var(--green)':r.errors<=10?'var(--amber)':'var(--red)'):'var(--muted)'};">${r.errors!=null?r.errors:'—'}</td>
        <td>${r.score||'TBC'}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

// ── By Round ───────────────────────────────────────────────────────────────
function renderRounds(){
  const el=document.getElementById('panel-rounds');
  const rounds=getRounds();
  el.innerHTML=rounds.map(r=>{
    if(!hasData(r)) return `<div class="rd-card pending">
      <div class="rd-header">
        <div><div class="rd-title">R${r.rd} — ${r.opp} <span class="tag ${r.venue==='H'?'tag-h':'tag-a'}">${r.venue}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">No data entered yet</div></div>
        <div class="rd-result" style="background:rgba(136,138,170,.1);color:var(--muted);border:1px solid rgba(136,138,170,.2);">UPCOMING</div>
      </div></div>`;
    return `<div class="rd-card">
      <div class="rd-header">
        <div><div class="rd-title">R${r.rd} — ${r.opp} <span class="tag ${r.venue==='H'?'tag-h':'tag-a'}">${r.venue}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">${r.score||''}${r.note?' · '+r.note:''}</div></div>
        <div class="rd-result ${r.result==='W'?'win':'loss'}">${r.result==='W'?'✅ WIN':'❌ LOSS'}</div>
      </div>
      <div class="grid-3" style="margin-bottom:10px;">

// ── Trends ─────────────────────────────────────────────────────────────────
function renderTrends(){
  const el=document.getElementById('panel-trends');
  const rounds=getRounds(), logged=rounds.filter(hasData);
  if(logged.length<2){
    el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--muted);">Need at least 2 rounds of data to show trends.</div>';
    return;
  }
  const W=540,H=180,PAD=38,LW=W-PAD*2;
  const step=logged.length>1?LW/(logged.length-1):LW;
  function py(v,mn,mx){return PAD+(1-(v-mn)/(mx-mn||1))*(H-PAD*2);}
  const comps=logged.map(r=>r.comp);
  const h1s=logged.filter(r=>r.h1comp!=null).map(r=>r.h1comp);
  const h2s=logged.filter(r=>r.h2comp!=null).map(r=>r.h2comp);
  const all=[...comps,...h1s,...h2s];
  const mn=Math.min(...all)-5, mx=Math.max(...all)+5;
  function polyline(arr,col){
    if(arr.length<1) return '';
    const pts=arr.map((v,i)=>`${PAD+i*step},${py(v,mn,mx)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round"/>
    ${arr.map((v,i)=>`<circle cx="${PAD+i*step}" cy="${py(v,mn,mx)}" r="4" fill="${col}"/>
    <text x="${PAD+i*step}" y="${py(v,mn,mx)-8}" text-anchor="middle" fill="${col}" font-size="9" font-weight="700">${v.toFixed(0)}%</text>`).join('')}`;
  }
  const h1logged=logged.filter(r=>r.h1comp!=null);
  const h2logged=logged.filter(r=>r.h2comp!=null);
  const svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <rect width="${W}" height="${H}" fill="#13131f" rx="8"/>
    <line x1="${PAD}" y1="${py(70,mn,mx)}" x2="${W-PAD}" y2="${py(70,mn,mx)}" stroke="rgba(245,196,0,.3)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${W-PAD+4}" y="${py(70,mn,mx)+4}" fill="rgba(245,196,0,.5)" font-size="9">70%</text>
    ${polyline(comps,'#5b9bd5')}
    ${h1logged.length>1?polyline(h1s,'#e74c3c'):''}
    ${h2logged.length>1?polyline(h2s,'#2ecc71'):''}
    ${logged.map((r,i)=>`<text x="${PAD+i*step}" y="${H-5}" text-anchor="middle" fill="#555" font-size="9">R${r.rd}</text>`).join('')}
  </svg>`;

  const errLogged=logged.filter(r=>r.errors!=null);
  const penLogged=logged.filter(r=>r.penAg!=null);

  el.innerHTML=`
  <div class="card">
    <div class="card-title">📈 Completion % Trend</div>
    ${svg}
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:11px;">
      <span style="color:#5b9bd5;">● Total comp%</span>
      ${h1logged.length>1?'<span style="color:#e74c3c;">● H1 comp%</span>':''}
      ${h2logged.length>1?'<span style="color:#2ecc71;">● H2 comp%</span>':''}
      <span style="color:rgba(245,196,0,.6);">— — 70% target</span>
    </div>
  </div>
  ${errLogged.length>=2 ? `
  <div class="card">
    <div class="card-title">❌ Errors Trend</div>
    ${errLogged.map(r=>{const col=r.errors<=8?'var(--green)':r.errors<=10?'var(--amber)':'var(--red)';return`
    <div class="bar-wrap">
      <div class="bar-label"><span>R${r.rd} vs ${r.opp}</span><span style="color:${col};font-weight:700;">${r.errors}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${r.errors/15*100}%;background:${col};"></div></div>
    </div>`}).join('')}
    <div style="font-size:11px;color:var(--muted);margin-top:6px;">Target: ≤8 per game</div>
  </div>` : ''}
  ${penLogged.length>=2 ? `
  <div class="card">
    <div class="card-title">⚠️ Penalties Against Trend</div>
    ${penLogged.map(r=>{const col=r.penAg<=7?'var(--green)':r.penAg<=9?'var(--amber)':'var(--red)';return`
    <div class="bar-wrap">
      <div class="bar-label"><span>R${r.rd} vs ${r.opp}</span><span style="color:${col};font-weight:700;">${r.penAg}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${r.penAg/15*100}%;background:${col};"></div></div>
    </div>`}).join('')}
    <div style="font-size:11px;color:var(--muted);margin-top:6px;">Target: ≤7 per game</div>
  </div>` : ''}`;
}

function _makeLpoRow(cls, optPlaceholder, sspPlaceholder){
  const div = document.createElement('div');
  div.className = cls;
  div.style = 'display:grid;grid-template-columns:1fr 1fr 32px;gap:6px;margin-bottom:6px;';
  div.innerHTML = `
    <input type="text" class="lpo-option" placeholder="${optPlaceholder}" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px;font-size:13px;width:100%;">
    <input type="text" class="lpo-oppsetstart" placeholder="${sspPlaceholder}" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px;font-size:13px;width:100%;">
    <button onclick="this.closest('.${cls}').remove()" style="background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);border-radius:8px;color:#e74c3c;cursor:pointer;font-size:14px;font-weight:700;">✕</button>`;
  return div;
}

function addLpo2HRow(){

  function readRows(cls){
    const rows = document.querySelectorAll('.'+cls);

    rows.forEach(row => {
      const option = row.querySelector('.lpo-option').value.trim();
      const oppSetStart = row.querySelector('.lpo-oppsetstart').value.trim();
      if(option || oppSetStart) out.push({option, oppSetStart});
    });
    return out;
  }
  return { lpo1h: readRows('lpo1h-row'), lpo2h: readRows('lpo2h-row') };
}

function calcPen(){
  const h1pf=parseFloat(document.getElementById('f-h1penFor').value)||0;
  const h2pf=parseFloat(document.getElementById('f-h2penFor').value)||0;
  const h1pa=parseFloat(document.getElementById('f-h1penAg').value)||0;
  const h2pa=parseFloat(document.getElementById('f-h2penAg').value)||0;
  const h1er=parseFloat(document.getElementById('f-h1errors').value)||0;
  const h2er=parseFloat(document.getElementById('f-h2errors').value)||0;
  const pfEl=document.getElementById('f-penFor');
  const paEl=document.getElementById('f-penAg');
  const erEl=document.getElementById('f-errors');
  if(pfEl && (h1pf||h2pf)) pfEl.value=h1pf+h2pf;
  if(paEl && (h1pa||h2pa)) paEl.value=h1pa+h2pa;
  if(erEl && (h1er||h2er)) erEl.value=h1er+h2er;
}

function calcPct(){
  const h1cs=parseFloat(document.getElementById('f-h1cs').value)||0;
  const h2cs=parseFloat(document.getElementById('f-h2cs').value)||0;
  const totalcs=parseFloat(document.getElementById('f-totalcs').value)||0;
  const h1tot=parseFloat(document.getElementById('f-h1tot').value)||0;
  const h2tot=parseFloat(document.getElementById('f-h2tot').value)||0;
  const tot=parseFloat(document.getElementById('f-tot').value)||0;
  const prev=document.getElementById('calc-preview');
  if(!prev) return;
  const h1pct=h1tot>0?((h1cs/h1tot)*100).toFixed(1):null;
  const h2pct=h2tot>0?((h2cs/h2tot)*100).toFixed(1):null;
  const totpct=tot>0?((totalcs/tot)*100).toFixed(1):null;
  if(!h1pct && !h2pct && !totpct){ prev.innerHTML='Enter sets above to auto-calculate completion %'; return; }
  prev.innerHTML=`Calculated: H1 <span>${h1pct!=null?h1pct+'%':'—'}</span> · H2 <span>${h2pct!=null?h2pct+'%':'—'}</span> · Total <span>${totpct!=null?totpct+'%':'—'}</span>`;
}

function submitEntry(rd){
  const result=document.getElementById('f-result').value;
  const score=document.getElementById('f-score').value.trim();
  const h1cs=parseFloat(document.getElementById('f-h1cs').value)||null;
  const h2cs=parseFloat(document.getElementById('f-h2cs').value)||null;
  const totalcs=parseFloat(document.getElementById('f-totalcs').value)||null;
  const h1tot=parseFloat(document.getElementById('f-h1tot').value)||null;
  const h2tot=parseFloat(document.getElementById('f-h2tot').value)||null;
  const tot=parseFloat(document.getElementById('f-tot').value)||null;
  const h1penFor=document.getElementById('f-h1penFor').value!==''?parseFloat(document.getElementById('f-h1penFor').value):null;
  const h2penFor=document.getElementById('f-h2penFor').value!==''?parseFloat(document.getElementById('f-h2penFor').value):null;
  const penFor=document.getElementById('f-penFor').value!==''?parseFloat(document.getElementById('f-penFor').value):null;
  const h1penAg=document.getElementById('f-h1penAg').value!==''?parseFloat(document.getElementById('f-h1penAg').value):null;
  const h2penAg=document.getElementById('f-h2penAg').value!==''?parseFloat(document.getElementById('f-h2penAg').value):null;
  const penAg=document.getElementById('f-penAg').value!==''?parseFloat(document.getElementById('f-penAg').value):null;
  const h1errors=document.getElementById('f-h1errors').value!==''?parseFloat(document.getElementById('f-h1errors').value):null;
  const h2errors=document.getElementById('f-h2errors').value!==''?parseFloat(document.getElementById('f-h2errors').value):null;
  const errors=document.getElementById('f-errors').value!==''?parseFloat(document.getElementById('f-errors').value):null;
  const h1comp=h1cs!=null&&h1tot?parseFloat((h1cs/h1tot*100).toFixed(1)):null;
  const h2comp=h2cs!=null&&h2tot?parseFloat((h2cs/h2tot*100).toFixed(1)):null;
  const comp=totalcs!=null&&tot?parseFloat((totalcs/tot*100).toFixed(1)):(h1comp&&h2comp?parseFloat(((h1comp+h2comp)/2).toFixed(1)):null);
  const h1ncs=h1cs!=null&&h1tot?h1tot-h1cs:null;
  const h2ncs=h2cs!=null&&h2tot?h2tot-h2cs:null;
  const totalncs=totalcs!=null&&tot?tot-totalcs:null;

  const obj={};
  if(result) obj.result=result;
  if(score) obj.score=score;
  if(h1cs!=null){obj.h1cs=h1cs;obj.h1tot=h1tot;obj.h1ncs=h1ncs;obj.h1comp=h1comp;}
  if(h2cs!=null){obj.h2cs=h2cs;obj.h2tot=h2tot;obj.h2ncs=h2ncs;obj.h2comp=h2comp;}
  if(totalcs!=null){obj.totalcs=totalcs;obj.tot=tot;obj.totalncs=totalncs;obj.comp=comp;}
  if(h1penFor!=null) obj.h1penFor=h1penFor;
  if(h2penFor!=null) obj.h2penFor=h2penFor;
  if(penFor!=null) obj.penFor=penFor;
  if(h1penAg!=null) obj.h1penAg=h1penAg;
  if(h2penAg!=null) obj.h2penAg=h2penAg;
  if(penAg!=null) obj.penAg=penAg;
  if(h1errors!=null) obj.h1errors=h1errors;
  if(h2errors!=null) obj.h2errors=h2errors;
  if(errors!=null) obj.errors=errors;
  const {lpo1h, lpo2h} = collectLpo();
  if(lpo1h.length) obj.lpo1h=lpo1h;
  if(lpo2h.length) obj.lpo2h=lpo2h;
  obj.note=null;

  saveData(rd, obj);
  updateHero();

  const notice=document.getElementById('save-notice');
  notice.style.display='block';
  setTimeout(()=>notice.style.display='none', 2000);

  // Refresh round selector to show green dot
  const btns=document.querySelectorAll('.rd-select-btn');
  if(btns[rd-1]) btns[rd-1].classList.add('has-data');
}

function clearEntry(rd){
  if(!confirm(`Clear all saved data for R${rd}?`)) return;
  clearRound(rd);
  updateHero();
  renderEntryForm(rd);
}

// Expose functions needed by inline onclick handlers
window.showTab         = showTab;
window.renderEntryForm = renderEntryForm;
window.setEntryRound   = setEntryRound;
window.submitEntry     = submitEntry;
window.clearEntry      = clearEntry;
window.addLpo1HRow     = addLpo1HRow;
window.addLpo2HRow     = addLpo2HRow;
window.calcPct         = calcPct;
window.calcPen         = calcPen;

_initFirestore();
</script>
</body>
