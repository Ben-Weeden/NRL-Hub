  const ens=t=>{ if(!s[t]) s[t]={team:t,p:0,w:0,d:0,l:0,f:0,a:0,byes:0,results:[]}; return s[t]; };
  games.forEach(g=>{
    const H=ens(g.home),A=ens(g.away);
    H.p++;A.p++; H.f+=g.hs;H.a+=g.as; A.f+=g.as;A.a+=g.hs;
    if(g.hs>g.as){H.w++;A.l++;H.results.push({r:g.r,res:'W',opp:g.away,sc:g.hs,oc:g.as});A.results.push({r:g.r,res:'L',opp:g.home,sc:g.as,oc:g.hs});}
    else if(g.hs<g.as){A.w++;H.l++;H.results.push({r:g.r,res:'L',opp:g.away,sc:g.hs,oc:g.as});A.results.push({r:g.r,res:'W',opp:g.home,sc:g.as,oc:g.hs});}
    else {H.d++;A.d++;H.results.push({r:g.r,res:'D',opp:g.away,sc:g.hs,oc:g.as});A.results.push({r:g.r,res:'D',opp:g.home,sc:g.as,oc:g.hs});}
  });
  if(opts.rounds){ Object.values(s).forEach(t=>{ t.byes=opts.rounds-t.p; }); }
  Object.values(s).forEach(t=>{
    t.pts=t.w*2+t.d+(opts.byePts?t.byes*2:0);
    t.diff=t.f-t.a;
    t.avgF=t.p?(t.f/t.p):0; t.avgA=t.p?(t.a/t.p):0;
    t.form=t.results.sort((a,b)=>a.r-b.r).slice(-5).map(x=>x.res);
  });
  return Object.values(s).sort((a,b)=>b.pts-a.pts||b.diff-a.diff);
}

// ═══════ 1ST vs 2ND HALF ANALYTICS (auto-generated 13 Jul 2026) ═══════
function halvesCompute(games){
  const withHT = games.filter(g=>g.hh!=null&&g.ha!=null);
  const teams = {};
  const ens = (t)=>{ if(!teams[t]) teams[t]={team:t,g:0,h1f:0,h1a:0,h2f:0,h2a:0,ledHT:0,levelHT:0,trailHT:0,comebackW:0,blownL:0,winFromLead:0}; return teams[t]; };
  const cb=[]; const surges=[];
  withHT.forEach(g=>{
    const h2h=g.hs-g.hh, h2a=g.as-g.ha;
    [[g.home,g.hh,g.ha,g.hs,g.as,h2h,h2a],[g.away,g.ha,g.hh,g.as,g.hs,h2a,h2h]].forEach(x=>{
      const [t,htF,htA,ftF,ftA,sF,sA]=x; const T=ens(t);
      T.g++; T.h1f+=htF; T.h1a+=htA; T.h2f+=sF; T.h2a+=sA;
      const led=htF>htA, level=htF===htA, won=ftF>ftA, lost=ftF<ftA;
      if(led)T.ledHT++; else if(level)T.levelHT++; else T.trailHT++;
      if(!led&&!level&&won){T.comebackW++;}
      if(led&&lost){T.blownL++;}
      if(led&&won){T.winFromLead++;}
    });
    const hLed=g.hh>g.ha, aLed=g.ha>g.hh, hWon=g.hs>g.as, aWon=g.as>g.hs;
    if((aLed&&hWon)||(hLed&&aWon)){
      const winner=hWon?g.home:g.away, deficit=hWon?(g.ha-g.hh):(g.hh-g.ha);
      const loser=hWon?g.away:g.home;
      cb.push({r:g.r,winner,loser,deficit,ht:g.hh+'–'+g.ha,ft:g.hs+'–'+g.as});
    }
    const hSurge=(g.hs-g.hh)-(g.as-g.ha);
    surges.push({r:g.r,team:hSurge>=0?g.home:g.away,opp:hSurge>=0?g.away:g.home,swing:Math.abs(hSurge),ht:g.hh+'–'+g.ha,ft:g.hs+'–'+g.as});
  });
  // League aggregates
  let h1Tot=0,h2Tot=0,ledWin=0,ledCnt=0;
  withHT.forEach(g=>{
    h1Tot+=g.hh+g.ha; h2Tot+=(g.hs-g.hh)+(g.as-g.ha);
    if(g.hh!==g.ha){ ledCnt++; const ledHome=g.hh>g.ha; if((ledHome&&g.hs>g.as)||(!ledHome&&g.as>g.hs)) ledWin++; }
  });
  cb.sort((a,b)=>b.deficit-a.deficit);
  surges.sort((a,b)=>b.swing-a.swing);
  return {withHT, total:games.length, teams:Object.values(teams), cb, surges,
          h1Avg:withHT.length?h1Tot/withHT.length:0, h2Avg:withHT.length?h2Tot/withHT.length:0,
          ledWinPct:ledCnt?Math.round(ledWin/ledCnt*100):0, ledCnt};
}

function halvesBarChart(rows, opts){
  // rows: [{label, v1, v2, color?}] — grouped horizontal bars, H1 vs H2 series
  const c1=opts.c1, c2=opts.c2, ink=opts.ink||'#C0CCE0', muted=opts.muted||'#8892A8';
  const W=760, rowH=34, padL=132, padR=56, barH=9, gap=3;
  const H=rows.length*rowH+42;
  const maxV=Math.max(...rows.map(r=>Math.max(r.v1,r.v2)),1)*1.08;
  const sx=v=>padL+(W-padL-padR)*(v/maxV);
  let g='';
  // gridlines
  const step=maxV>30?10:maxV>12?5:2;
  for(let v=0;v<=maxV;v+=step){
    g+='<line x1="'+sx(v)+'" y1="18" x2="'+sx(v)+'" y2="'+(H-24)+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';
    g+='<text x="'+sx(v)+'" y="'+(H-10)+'" fill="'+muted+'" font-size="9" text-anchor="middle">'+v+'</text>';
  }
  rows.forEach((r,i)=>{
    const y=26+i*rowH;
    g+='<text x="'+(padL-8)+'" y="'+(y+barH+2)+'" fill="'+ink+'" font-size="10" font-weight="700" text-anchor="end">'+r.label+'</text>';
    g+='<rect x="'+padL+'" y="'+y+'" width="'+Math.max(sx(r.v1)-padL,1.5)+'" height="'+barH+'" rx="3" fill="'+c1+'"><title>'+r.label+' — 1st half: '+r.v1.toFixed(1)+'</title></rect>';
    g+='<text x="'+(sx(r.v1)+5)+'" y="'+(y+barH-1)+'" fill="'+muted+'" font-size="8.5">'+r.v1.toFixed(1)+'</text>';
    const y2=y+barH+gap;
    g+='<rect x="'+padL+'" y="'+y2+'" width="'+Math.max(sx(r.v2)-padL,1.5)+'" height="'+barH+'" rx="3" fill="'+c2+'"><title>'+r.label+' — 2nd half: '+r.v2.toFixed(1)+'</title></rect>';
    g+='<text x="'+(sx(r.v2)+5)+'" y="'+(y2+barH-1)+'" fill="'+muted+'" font-size="8.5">'+r.v2.toFixed(1)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto" role="img" aria-label="First vs second half points by team">'+g+'</svg>';
}

// ═══════ ADVANCED METRICS (computed from verified results) ═══════
function advCompute(games, opts){
  opts=opts||{};
  const t={};
  const ens=n=>{ if(!t[n]) t[n]={team:n,g:0,w:0,d:0,l:0,f:0,a:0,margins:[],close:0,closeW:0,blow:0,blowW:0,h1d:0,h2d:0,htg:0}; return t[n]; };
  games.forEach(g=>{
    [[g.home,g.hs,g.as,g.hh,g.ha],[g.away,g.as,g.hs,g.ha,g.hh]].forEach(x=>{
      const [n,f,a,hf,ha]=x; const T=ens(n);
      T.g++; T.f+=f; T.a+=a; T.margins.push(f-a);
      if(f>a)T.w++; else if(f<a)T.l++; else T.d++;
      const m=Math.abs(f-a);
      if(m<=6){T.close++; if(f>a)T.closeW++;}
      if(m>=18){T.blow++; if(f>a)T.blowW++;}
      if(hf!=null){T.htg++; T.h1d+=hf-ha; T.h2d+=(f-hf)-(a-ha);}
    });
  });
  const arr=Object.values(t);
  arr.forEach(T=>{
    const e=2.0; // pythagorean exponent for rugby league
    T.pyth=T.g*(Math.pow(T.f,e)/(Math.pow(T.f,e)+Math.pow(T.a,e)||1));
    T.luck=(T.w+T.d*0.5)-T.pyth;
    T.avgM=T.margins.reduce((s,x)=>s+x,0)/T.g;
    const mean=T.avgM;
    T.vol=Math.sqrt(T.margins.reduce((s,x)=>s+(x-mean)*(x-mean),0)/T.g);
    T.swing=T.htg?(T.h2d-T.h1d)/T.htg:0;
  });
  // strength of schedule: mean of opponents' avg margin
  const rate={}; arr.forEach(T=>rate[T.team]=T.avgM);
  arr.forEach(T=>{ T.sosList=[]; });
  games.forEach(g=>{ ens(g.home).sosList.push(rate[g.away]); ens(g.away).sosList.push(rate[g.home]); });
  arr.forEach(T=>{ T.sos=T.sosList.length?T.sosList.reduce((s,x)=>s+x,0)/T.sosList.length:0; });
  return arr.sort((a,b)=>b.avgM-a.avgM);
}

  }).join('');
  return '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">'+tiles+'</div>'+
   '<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:18px;margin-bottom:16px">'+
     '<h3 style="color:white;font-size:13px;font-weight:800;margin-bottom:8px">⚡ POWER RATINGS — AVG MARGIN PER GAME</h3>'+bars+'</div>'+
   '<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:18px;overflow-x:auto">'+
     '<h3 style="color:white;font-size:13px;font-weight:800;margin-bottom:10px">🔬 ADVANCED METRICS TABLE</h3>'+
     '<style>.adv-tbl td{padding:6px 8px;border-top:1px solid rgba(255,255,255,.05);text-align:center}.adv-tbl th{padding:6px 8px}</style>'+
     '<table class="adv-tbl" style="width:100%;border-collapse:collapse;font-size:10.5px"><thead><tr style="color:'+muted+';font-size:8.5px;text-transform:uppercase;letter-spacing:.5px">'+
     '<th style="text-align:left">Team</th><th>Rating (avg margin)</th><th>Pyth. exp. wins</th><th>Luck (W − exp)</th><th>SOS</th><th>Volatility (σ margin)</th><th>Close (≤6) W</th><th>Blowout (18+) W</th><th>2H swing/g</th></tr></thead>'+
     '<tbody style="color:#D5DEEE">'+rows+'</tbody></table>'+
     '<p style="font-size:9px;color:'+muted+';margin-top:8px">Pythagorean expected wins from points for/against (exponent 2.0) — a truer measure of quality than the ladder. Luck = actual wins vs expectation (positive = winning more than underlying performance). SOS = average opponent power rating (positive = harder draw). Volatility = standard deviation of margins. 2H swing = second-half differential minus first-half differential per game (games with half-time data).</p></div>';
}

// ═══════ TRY ZONE — SCORING PROFILE (verified timing + channel proxies) ═══════
function tzCompute(games){
  const t={};
  const ens=n=>{ if(!t[n]) t[n]={team:n,g:0,f:0,a:0,h1f:0,h2f:0,h1a:0,h2a:0,htg:0,burst:0,shutH:0}; return t[n]; };
  games.forEach(g=>{
    [[g.home,g.hs,g.as,g.hh,g.ha],[g.away,g.as,g.hs,g.ha,g.hh]].forEach(x=>{
      const [n,f,a,hf,ha]=x; const T=ens(n);
      T.g++; T.f+=f; T.a+=a;
      if(hf!=null){ T.htg++; T.h1f+=hf; T.h2f+=f-hf; T.h1a+=ha; T.h2a+=a-ha;
        if(hf>=20||f-hf>=20)T.burst++;
        if(hf===0||f-hf===0)T.shutH++; }
    });
  });
  return Object.values(t).map(T=>({...T,
    est:T.f/4.7,  // rough tries estimate: comp scoring ≈ 4.7 pts per try incl. conversions
    h1pct:(T.h1f+T.h2f)?T.h1f/(T.h1f+T.h2f)*100:50,
    a1pct:(T.h1a+T.h2a)?T.h1a/(T.h1a+T.h2a)*100:50,
  })).sort((a,b)=>b.f-a.f);
}

  const {cardBg,border,muted,acc,acc2,short,scorers,method,hl}=cfg;

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong style="font-size:12px;color:#fff">'+S(T.team)+'</strong><span style="font-size:9px;color:'+muted+'">'+T.g+' games</span></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;text-align:center">'+
      '<div style="background:rgba(74,222,128,.08);border-radius:8px;padding:8px"><div style="font-size:15px;font-weight:900;color:#4ADE80">~'+T.est.toFixed(0)+'</div><div style="font-size:8px;color:'+muted+'">EST. TRIES</div></div>'+
      '<div style="background:rgba(255,255,255,.04);border-radius:8px;padding:8px"><div style="font-size:15px;font-weight:900;color:#fff">'+(T.f/T.g).toFixed(1)+'</div><div style="font-size:8px;color:'+muted+'">PTS / GAME</div></div>'+

      '<div title="1st half '+T.h1pct.toFixed(0)+'%" style="width:'+T.h1pct+'%;background:'+acc+';display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:800;color:#0A0A1E">'+T.h1pct.toFixed(0)+'%</div>'+
      '<div title="2nd half" style="flex:1;background:'+acc2+';display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:800;color:#0A0A1E">'+(100-T.h1pct).toFixed(0)+'%</div></div></div>'+
    '<div style="margin-top:6px"><div style="font-size:8px;color:'+muted+';margin-bottom:3px">WHEN THEY CONCEDE</div>'+
      '<div style="display:flex;height:12px;border-radius:6px;overflow:hidden;opacity:.75">'+
      '<div style="width:'+T.a1pct+'%;background:#F87171;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:800;color:#0A0A1E">'+T.a1pct.toFixed(0)+'%</div>'+
      '<div style="flex:1;background:#7F1D1D;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:800;color:#fff">'+(100-T.a1pct).toFixed(0)+'%</div></div></div>'+
    '<div style="display:flex;gap:6px;margin-top:8px;font-size:8.5px;color:'+muted+'"><span>⚡ '+T.burst+' × 20+ pt halves</span><span>🧱 '+T.shutH+' × scoreless halves (them or opp)</span></div>'+
    '</div>';
  }).join('');
  const scorersHtml=scorers&&scorers.length?
    '<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:18px;margin-bottom:16px">'+
    '<h3 style="color:white;font-size:13px;font-weight:800;margin-bottom:10px">🏅 LEADING SCORERS — VERIFIED</h3>'+
    scorers.map(s=>'<div style="display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid '+border+';border-radius:8px;margin-bottom:6px;font-size:11px;flex-wrap:wrap;gap:6px"><span><strong style="color:#fff">'+s.player+'</strong> <span style="color:'+muted+'">('+s.team+' · '+s.pos+')</span></span><span style="font-weight:800;color:'+acc2+'">'+s.stat+'</span></div>').join('')+'</div>':'';

    '<h2 style="color:white;font-size:15px;font-weight:900;margin-bottom:4px">🗺️ TRY ZONE — SCORING PROFILE</h2>'+

}

// ═══════ TEAM PROFILES ═══════
function profilesHTML(games, cfg){
  const {cardBg,border,muted,acc,tcol,short,ladder,notes}=cfg;
  const S=n=>short?short(n):n;
  const stats={};
  const ens=n=>{ if(!stats[n]) stats[n]={team:n,g:0,w:0,d:0,l:0,f:0,a:0,res:[],bestW:null,worstL:null,h1d:0,h2d:0,htg:0}; return stats[n]; };
  games.forEach(g=>{
    [[g.home,g.hs,g.as,g.hh,g.ha,g.away,'v'],[g.away,g.as,g.hs,g.ha,g.hh,g.home,'@']].forEach(x=>{
      const [n,f,a,hf,ha,opp,ha_]=x; const T=ens(n);
      T.g++; T.f+=f; T.a+=a;
      const r=f>a?'W':f<a?'L':'D';
      T[r==='W'?'w':r==='L'?'l':'d']++;
      T.res.push({r:g.r,res:r,opp,f,a,ha:ha_});
      const m=f-a;
      if(m>0&&(!T.bestW||m>T.bestW.m))T.bestW={m,opp,f,a,r:g.r};
      if(m<0&&(!T.worstL||m<T.worstL.m))T.worstL={m,opp,f,a,r:g.r};
      if(hf!=null){T.htg++;T.h1d+=hf-ha;T.h2d+=(f-hf)-(a-ha);}
    });
  });
  const lpos={}; if(ladder)ladder.forEach((t,i)=>lpos[t.team||t]=i+1);
  const arr=Object.values(stats).sort((a,b)=>(lpos[a.team]||99)-(lpos[b.team]||99));
  return '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">'+arr.map(T=>{
    const form=T.res.sort((a,b)=>a.r-b.r).slice(-5);
    const note=notes&&notes[T.team]?'<p style="font-size:10px;color:#C0CCE0;line-height:1.6;margin-top:8px">'+notes[T.team]+'</p>':'';
    return '<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:16px">'+
    '<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">'+
      '<span style="width:14px;height:14px;border-radius:4px;background:'+((tcol&&tcol[T.team])||'#666')+'"></span>'+
      '<strong style="font-size:13px;color:#fff">'+S(T.team)+'</strong>'+
      (lpos[T.team]?'<span style="margin-left:auto;font-size:9px;font-weight:800;color:'+muted+'">#'+lpos[T.team]+' ON LADDER</span>':'')+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;margin-bottom:9px">'+
      [['REC',T.w+'-'+T.d+'-'+T.l],['PF/G',(T.f/T.g).toFixed(1)],['PA/G',(T.a/T.g).toFixed(1)],['DIFF',(T.f-T.a>0?'+':'')+(T.f-T.a)]]
      .map(x=>'<div style="background:rgba(255,255,255,.04);border-radius:7px;padding:7px 4px"><div style="font-size:11.5px;font-weight:900;color:#fff">'+x[1]+'</div><div style="font-size:7.5px;color:'+muted+'">'+x[0]+'</div></div>').join('')+'</div>'+
    '<div style="display:flex;gap:3px;margin-bottom:8px">'+form.map(x=>'<span title="R'+x.r+' '+x.ha+' '+S(x.opp)+' '+x.f+'–'+x.a+'" style="width:20px;height:20px;border-radius:5px;font-size:9px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;background:'+(x.res==='W'?'rgba(74,222,128,.18)':x.res==='D'?'rgba(250,204,21,.15)':'rgba(248,113,113,.14)')+';color:'+(x.res==='W'?'#4ADE80':x.res==='D'?'#FACC15':'#F87171')+'">'+x.res+'</span>').join('')+'</div>'+
    '<div style="font-size:9.5px;color:'+muted+';line-height:1.7">'+
      (T.bestW?'Best: <strong style="color:#4ADE80">'+T.bestW.f+'–'+T.bestW.a+'</strong> v '+S(T.bestW.opp)+' (R'+T.bestW.r+')<br>':'')+
      (T.worstL?'Worst: <strong style="color:#F87171">'+T.worstL.f+'–'+T.worstL.a+'</strong> v '+S(T.worstL.opp)+' (R'+T.worstL.r+')<br>':'')+
      (T.htg?'Halves: '+(T.h1d>=0?'+':'')+T.h1d+' H1 · '+(T.h2d>=0?'+':'')+T.h2d+' H2':'')+'</div>'+note+'</div>';
  }).join('')+'</div>';
}

// ═══════ SCOUT REPORTS (computed from verified results) ═══════
function scoutHTML(games, cfg){
  const {cardBg,border,muted,acc,acc2,tcol,ladder,squads}=cfg;
  const adv=advCompute(games); // from ADV_JS
  const atkRank=[...adv].sort((a,b)=>(b.f/b.g)-(a.f/a.g)).map(t=>t.team);
  const defRank=[...adv].sort((a,b)=>(a.a/a.g)-(b.a/b.g)).map(t=>t.team);
  const lpos={}; if(ladder)ladder.forEach((t,i)=>lpos[t.team]=i+1);
  const hz=halvesCompute(games); const hzT={}; hz.teams.forEach(t=>hzT[t.team]=t);
  // home/away
  const ha={};
  games.forEach(g=>{
    ha[g.home]=ha[g.home]||{hW:0,hG:0,aW:0,aG:0}; ha[g.away]=ha[g.away]||{hW:0,hG:0,aW:0,aG:0};
    ha[g.home].hG++; ha[g.away].aG++;
    if(g.hs>g.as)ha[g.home].hW++; else if(g.as>g.hs)ha[g.away].aW++;
  });
  const ord=n=>n===1?'st':n===2?'nd':n===3?'rd':'th';
  return [...adv].sort((a,b)=>(lpos[a.team]||99)-(lpos[b.team]||99)).map(T=>{
    const h=hzT[T.team]||{h1f:0,h1a:0,h2f:0,h2a:0,comebackW:0,blownL:0,ledHT:0,g:1};
    const aR=atkRank.indexOf(T.team)+1, dR=defRank.indexOf(T.team)+1;
    const HA=ha[T.team]||{hW:0,hG:1,aW:0,aG:1};
    const weapons=[], vulns=[], plan=[];
    if(aR<=3)weapons.push('Top-'+aR+' attack in the comp — '+(T.f/T.g).toFixed(1)+' points per game.');
    if(dR<=3)weapons.push((dR===1?'Best':'Top-'+dR)+' defence — concede just '+(T.a/T.g).toFixed(1)+'/game.');
    if((h.h2f-h.h2a)>(h.h1f-h.h1a)+4)weapons.push('Second-half side: differential improves by '+((h.h2f-h.h2a)-(h.h1f-h.h1a))+' after the break — fitness and bench win them games late.');
    if((h.h1f-h.h1a)>(h.h2f-h.h2a)+4)weapons.push('Fast starters: '+(h.h1f-h.h1a>0?'+':'')+(h.h1f-h.h1a)+' first-half differential — they look to kill games before oranges.');
    if(h.comebackW>0)weapons.push(h.comebackW+' comeback win'+(h.comebackW>1?'s':'')+' from behind at half-time — never dead.');
    if(T.closeW/Math.max(T.close,1)>=0.6&&T.close>=3)weapons.push('Close-game killers: '+T.closeW+' of '+T.close+' games decided by ≤6 won.');
    if(HA.hW/Math.max(HA.hG,1)>=0.7)weapons.push('Fortress factor: '+HA.hW+' of '+HA.hG+' at home.');
    if(aR>=atkRank.length-2)vulns.push('Bottom-3 attack ('+(T.f/T.g).toFixed(1)+'/game) — starve them of field position and they struggle to manufacture points.');
    if(dR>=defRank.length-2)vulns.push('Bottom-3 defence ('+(T.a/T.g).toFixed(1)+' conceded/game) — points are always on offer.');
    if(h.blownL>0)vulns.push('Blown '+h.blownL+' half-time lead'+(h.blownL>1?'s':'')+' — pressure in the last 20 pays off.');
    if(T.closeW/Math.max(T.close,1)<0.4&&T.close>=3)vulns.push('Poor in tight finishes: only '+T.closeW+' of '+T.close+' close games won — stay in the contest and they beat themselves.');
    if(HA.aW/Math.max(HA.aG,1)<=0.34&&HA.aG>=3)vulns.push('Travel poorly: '+HA.aW+' win'+(HA.aW===1?'':'s')+' from '+HA.aG+' on the road.');
    if(T.vol>16)vulns.push('Boom-bust profile (σ '+T.vol.toFixed(0)+') — capable of anything, vulnerable to everything.');
    if((h.h1a/Math.max(h.g,1))>(h.h2a/Math.max(h.g,1))+2)plan.push('They leak early — attack the first 20 before their game settles.');
    else if((h.h2a/Math.max(h.g,1))>(h.h1a/Math.max(h.g,1))+2)plan.push('They fade — hold the ball through the middle third and cash in after the 50th minute.');
    if(T.luck>0.8)plan.push('Record flatters them: winning '+T.luck.toFixed(1)+' games above Pythagorean expectation. Trust the process, not the ladder.');
    if(T.luck<-0.8)plan.push('Better than their record ('+T.luck.toFixed(1)+' below expectation) — do not take them lightly.');
    if(!plan.length)plan.push('No structural bias — this one is won in the middle: field position, completions, kick pressure.');
    const squad=squads&&squads[T.team]?'<div style="margin-top:9px;padding:9px 12px;background:rgba(255,255,255,.03);border:1px solid '+border+';border-radius:8px"><div style="font-size:8.5px;font-weight:800;letter-spacing:.6px;color:'+acc2+';margin-bottom:4px">KEY PERSONNEL</div><div style="font-size:10.5px;color:#C0CCE0;line-height:1.6">'+squads[T.team]+'</div></div>':'';
    return '<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:14px;padding:18px;margin-bottom:14px">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
      '<span style="width:14px;height:14px;border-radius:4px;background:'+((tcol&&tcol[T.team])||'#666')+'"></span>'+
      '<strong style="font-size:14px;color:#fff">'+T.team+'</strong>'+
      '<span style="margin-left:auto;font-size:9px;color:'+muted+';font-weight:800">'+(lpos[T.team]?lpos[T.team]+ord(lpos[T.team])+' · ':'')+'ATT #'+aR+' · DEF #'+dR+'</span></div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px">'+
      '<div style="background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:10px 12px"><div style="font-size:8.5px;font-weight:800;color:#4ADE80;letter-spacing:.5px;margin-bottom:4px">⚔️ WEAPONS</div><ul style="margin-left:14px;font-size:10.5px;color:#C0CCE0;line-height:1.6">'+(weapons.length?weapons:['No standout statistical edge — a middle-of-the-road profile.']).map(w=>'<li>'+w+'</li>').join('')+'</ul></div>'+
      '<div style="background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:10px 12px"><div style="font-size:8.5px;font-weight:800;color:#F87171;letter-spacing:.5px;margin-bottom:4px">🎯 VULNERABILITIES</div><ul style="margin-left:14px;font-size:10.5px;color:#C0CCE0;line-height:1.6">'+(vulns.length?vulns:['Few obvious cracks — beat them with execution, not scheme.']).map(w=>'<li>'+w+'</li>').join('')+'</ul></div>'+
      '<div style="background:rgba(255,255,255,.03);border:1px solid '+border+';border-radius:8px;padding:10px 12px"><div style="font-size:8.5px;font-weight:800;color:'+acc2+';letter-spacing:.5px;margin-bottom:4px">📋 HOW TO BEAT THEM</div><ul style="margin-left:14px;font-size:10.5px;color:#C0CCE0;line-height:1.6">'+plan.map(w=>'<li>'+w+'</li>').join('')+'</ul></div>'+
      '</div>'+squad+'</div>';
  }).join('');
}

// ═══════ HEAD-TO-HEAD MATRIX ═══════
function h2hHTML(games, cfg){
  const {muted,cardBg,border,short}=cfg;
  const S=n=>short?short(n):n;
  const teams=[...new Set(games.flatMap(g=>[g.home,g.away]))].sort();
  const cell={};
  games.forEach(g=>{
    const k1=g.home+'|'+g.away, k2=g.away+'|'+g.home;
    (cell[k1]=cell[k1]||[]).push({f:g.hs,a:g.as,r:g.r});
    (cell[k2]=cell[k2]||[]).push({f:g.as,a:g.hs,r:g.r});
  });
  const ab=n=>S(n).split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
  let head='<tr><th style="text-align:left">Team ↓ vs →</th>'+teams.map(t=>'<th title="'+t+'">'+ab(t)+'</th>').join('')+'</tr>';
  let rows=teams.map(r=>'<tr><td style="text-align:left;font-weight:700;white-space:nowrap">'+S(r)+'</td>'+teams.map(c=>{
    if(r===c)return '<td style="background:rgba(255,255,255,.05)">—</td>';
    const ms=cell[r+'|'+c];
    if(!ms)return '<td style="color:'+muted+'">·</td>';
    return '<td>'+ms.map(m=>{
      const col=m.f>m.a?'#4ADE80':m.f<m.a?'#F87171':'#FACC15';
      return '<span title="R'+m.r+': '+m.f+'–'+m.a+'" style="color:'+col+';font-weight:800;font-size:9.5px;display:block">'+m.f+'–'+m.a+'</span>';
    }).join('')+'</td>';
  }).join('')+'</tr>').join('');
  return '<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:18px;overflow-x:auto">'+
   '<h3 style="color:white;font-size:13px;font-weight:800;margin-bottom:10px">🔲 HEAD-TO-HEAD MATRIX <span style="color:'+muted+';font-size:10px;font-weight:600">(row team\'s score first · green = row team won · hover for round)</span></h3>'+
   '<style>.h2h td,.h2h th{padding:5px 6px;border:1px solid rgba(255,255,255,.05);text-align:center;font-size:10px}.h2h th{color:'+muted+';font-size:8.5px}</style>'+
   '<table class="h2h" style="border-collapse:collapse;width:100%">'+head+rows+'</table>'+
   '<p style="font-size:9px;color:'+muted+';margin-top:8px">· = not yet played this season.</p></div>';
}

// ═══════ SEASON RECORDS ═══════
function recordsHTML(games, cfg){
  const {cardBg,border,muted,acc,acc2}=cfg;
  const byMargin=[...games].sort((a,b)=>Math.abs(b.hs-b.as)-Math.abs(a.hs-a.as)).slice(0,5);
  const byTotal=[...games].sort((a,b)=>(b.hs+b.as)-(a.hs+a.as)).slice(0,5);
  const byLow=[...games].sort((a,b)=>(a.hs+a.as)-(b.hs+b.as)).slice(0,5);
  const wh=games.filter(g=>g.hh!=null);
  const byH1=[...wh].sort((a,b)=>(b.hh+b.ha)-(a.hh+a.ha)).slice(0,3);
  const byH2=[...wh].sort((a,b)=>((b.hs-b.hh)+(b.as-b.ha))-((a.hs-a.hh)+(a.as-a.ha))).slice(0,3);
  const li=(g,val)=>'<div style="display:flex;justify-content:space-between;gap:10px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid '+border+';border-radius:8px;margin-bottom:6px;font-size:10.5px;flex-wrap:wrap"><span><strong style="color:#fff">'+g.home+' '+g.hs+'–'+g.as+' '+g.away+'</strong> <span style="color:'+muted+'">R'+g.r+(g.hh!=null?' · HT '+g.hh+'–'+g.ha:'')+'</span></span><span style="font-weight:900;color:'+acc2+'">'+val+'</span></div>';
  const card=(title,items)=>'<div style="background:'+cardBg+';border:1px solid '+border+';border-radius:12px;padding:16px"><h3 style="color:white;font-size:12px;font-weight:800;margin-bottom:10px">'+title+'</h3>'+items+'</div>';
  return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px">'+
    card('💥 BIGGEST MARGINS',byMargin.map(g=>li(g,'+'+Math.abs(g.hs-g.as))).join(''))+
    card('🎆 HIGHEST-SCORING GAMES',byTotal.map(g=>li(g,(g.hs+g.as)+' pts')).join(''))+
    card('🧱 LOWEST-SCORING GAMES',byLow.map(g=>li(g,(g.hs+g.as)+' pts')).join(''))+
    card('⏱️ BIGGEST FIRST HALVES',byH1.map(g=>li(g,(g.hh+g.ha)+' H1 pts')).join('')+
         '<h3 style="color:white;font-size:12px;font-weight:800;margin:12px 0 10px">🌪️ BIGGEST SECOND HALVES</h3>'+byH2.map(g=>li(g,((g.hs-g.hh)+(g.as-g.ha))+' H2 pts')).join(''))+
  '</div>';
}

const L=computeLadder(GAMES,{rounds:19,byePts:true});
const CFG={cardBg:'var(--card)',border:'var(--bord)',muted:'var(--muted)',acc:'#00C2A8',acc2:'#FACC15',tcol:TCOL,short:n=>n};
let currentRound=19;
function buildOverview(){
  const totPts=GAMES.reduce((s,g)=>s+g.hs+g.as,0);
  const big=GAMES.reduce((b,g)=>Math.abs(g.hs-g.as)>Math.abs(b.hs-b.as)?g:b,GAMES[0]);
  const high=GAMES.reduce((b,g)=>(g.hs+g.as)>(b.hs+b.as)?g:b,GAMES[0]);
  const draws=GAMES.filter(g=>g.hs===g.as).length;
  const tiles=[
    {l:'GAMES PLAYED',v:GAMES.length,s:'rounds 1–19'},
    {l:'AVG POINTS / GAME',v:(totPts/GAMES.length).toFixed(1),s:'both teams combined'},
    {l:'LADDER LEADER',v:L[0].team,s:L[0].w+'W '+L[0].d+'D '+L[0].l+'L · '+L[0].pts+' pts'},
    {l:'BIGGEST WIN',v:Math.abs(big.hs-big.as),s:(big.hs>big.as?big.home:big.away)+' '+Math.max(big.hs,big.as)+'–'+Math.min(big.hs,big.as)+' (R'+big.r+')'},
    {l:'HIGHEST SCORING',v:(high.hs+high.as),s:high.home+' '+high.hs+'–'+high.as+' '+high.away+' (R'+high.r+')'},
    {l:'DRAWS',v:draws,s:'across the season'},
  ];
  const insights=[
    ['🏔️','Panthers the benchmark','12W 1D from 15 games (33 pts incl. byes) with a +136 differential. Lost just twice — clear minor-premiership favourite.'],
    ['⚔️','Knights the top attack','501 points from 16 games (31.3/game). They have scored 40+ six times.'],
    ['🐻','Bears back among the heavyweights','11 wins and the second-stingiest defence (337 conceded, behind only Penrith\'s 326).'],
    ['🏅','Saukuru the strike weapon','Wests Magpies winger Livai Saukuru leads the comp with 17 tries — a big share of the Magpies\' edge-heavy attack.'],
    ['🚨','Sea Eagles cut adrift','1 win from 16 — conceding 38.2/game (611 total). Bottom by 8 points.'],
    ['🎢','Magpies the volatility kings','A 68–8 demolition of the Roosters (R15) and a 64–10 loss to the Bulldogs (R17) three weeks apart — highest variance side in the comp.'],
  ];
  document.getElementById('page-overview').innerHTML=
    '<div class="tiles">'+tiles.map(t=>'<div class="tile"><div class="l">'+t.l+'</div><div class="v" style="font-size:'+(String(t.v).length>8?'16px':'24px')+'">'+t.v+'</div><div class="s">'+t.s+'</div></div>').join('')+'</div>'+
    '<div class="card"><h3>🧠 ANALYST READ — SEASON TO R19</h3>'+insights.map(x=>'<div class="mc"><span style="font-size:12px"><span style="margin-right:8px">'+x[0]+'</span><strong>'+x[1]+'</strong><div class="note" style="margin-top:4px">'+x[2]+'</div></span></div>').join('')+'</div>';
}
function buildResults(){
  const rounds=[...new Set(GAMES.map(g=>g.r))];
  document.getElementById('page-results').innerHTML=
    '<div class="card"><h3>📅 SELECT ROUND</h3><div style="display:flex;gap:5px;flex-wrap:wrap">'+rounds.map(r=>'<button class="fbtn'+(r===currentRound?' active':'')+'" onclick="selRound('+r+',this)">R'+r+'</button>').join('')+'</div></div>'+
    '<div id="round-out"></div>';
  renderRound(currentRound);
}
function selRound(r,btn){currentRound=r;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderRound(r);}
function renderRound(r){
  document.getElementById('round-out').innerHTML='<div class="card"><h3>ROUND '+r+' <span style="color:var(--muted);font-weight:600;font-size:10px">· '+(ROUND_DATES[r]||'')+'</span></h3>'+
    GAMES.filter(g=>g.r===r).map(g=>{
      const hw=g.hs>g.as, dr=g.hs===g.as;
      return '<div class="mc"><div style="min-width:230px"><span style="font-weight:'+(hw?900:600)+';color:'+(hw?'#fff':dr?'var(--gold)':'var(--muted)')+'">'+g.home+' '+g.hs+'</span><span style="color:var(--muted)"> – </span><span style="font-weight:'+(!hw&&!dr?900:600)+';color:'+(!hw&&!dr?'#fff':dr?'var(--gold)':'var(--muted)')+'">'+g.as+' '+g.away+'</span>'+(dr?' <span class="tag" style="padding:2px 8px">DRAW</span>':'')+
      '<div class="note">'+(g.hh!=null?('HT '+g.hh+'–'+g.ha+' · '):'')+g.venue+'</div></div></div>';
    }).join('')+'</div>';
}
function buildLadder(){
  document.getElementById('page-ladder').innerHTML='<div class="card"><h3>🏆 NSW CUP LADDER — AFTER ROUND 19</h3><div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Byes</th><th>PF</th><th>PA</th><th>Diff</th><th>Pts</th><th>Form</th></tr></thead><tbody>'+
    L.map((t,i)=>'<tr'+(i<5?' style="background:rgba(0,194,168,.06)"':'')+'><td>'+(i+1)+'</td><td style="font-weight:700"><span style="display:inline-block;width:9px;height:9px;border-radius:3px;background:'+(TCOL[t.team]||'#666')+';margin-right:7px"></span>'+t.team+'</td><td>'+t.p+'</td><td>'+t.w+'</td><td>'+t.d+'</td><td>'+t.l+'</td><td>'+t.byes+'</td><td>'+t.f+'</td><td>'+t.a+'</td><td style="font-weight:700;color:'+(t.diff>=0?'var(--green)':'var(--red)')+'">'+(t.diff>=0?'+':'')+t.diff+'</td><td style="font-weight:900;color:#fff">'+t.pts+'</td><td style="white-space:nowrap">'+formHtml(t.form)+'</td></tr>').join('')+
    '</tbody></table></div><p class="note">Byes worth 2 competition points (NSWRL rules). Top 5 shaded. Verified against the official Rugby League Project ladder.</p></div>';
}
function buildHalves(){
  const res=halvesCompute(GAMES);
  document.getElementById('page-halves').innerHTML=halvesHTML(res,{c1:'#00C2A8',c2:'#FACC15',accent:'var(--acc)',cardBg:'var(--card)',muted:'var(--muted)',short:n=>n});
}
function buildTZ(){ document.getElementById('page-tryzone').innerHTML=tzHTML(GAMES,{...CFG,scorers:SCORERS,method:"Precise try-placement (left/middle/right) tracking is not published for this competition, so this tab profiles each team's scoring from verified match data: estimated try volume (points \u00f7 4.7, the typical points-per-try rate), strike timing by half, concession timing, 20+ point halves and scoreless halves \u2014 cross-checked against Rugby League Project match records and official ladders. Leading-scorer facts below are verified, not modelled."}); }
function buildAdv(){ document.getElementById('page-advanced').innerHTML=advHTML(GAMES,CFG); }
function buildProfiles(){ document.getElementById('page-profiles').innerHTML=profilesHTML(GAMES,{...CFG,ladder:L}); }
function buildScouts(){
  document.getElementById('page-scouts').innerHTML='<div class="card" style="border-color:#00C2A8;margin-bottom:14px"><h3>🔍 SCOUT REPORTS — ALL 14 CLUBS</h3><p class="note" style="margin-top:0">Computed live from all 109 verified results: attack/defence ranks, halves patterns, close-game execution, travel record and Pythagorean quality.</p></div>'+scoutHTML(GAMES,{...CFG,ladder:L});
}
function buildH2H(){ document.getElementById('page-h2h').innerHTML=h2hHTML(GAMES,CFG); }
function buildRecords(){ document.getElementById('page-records').innerHTML=recordsHTML(GAMES,CFG); }
function buildAttack(){
  const atk=[...L].sort((a,b)=>b.avgF-a.avgF), def=[...L].sort((a,b)=>a.avgA-b.avgA);
  const mx=Math.max(...atk.map(t=>t.avgF)), mxA=Math.max(...def.map(t=>t.avgA));
  document.getElementById('page-attack').innerHTML=
    '<div class="card"><h3>⚔️ ATTACK — AVG POINTS SCORED / GAME</h3>'+atk.map(t=>barRow(t.team,t.avgF,mx,TCOL[t.team]||'#666')).join('')+'</div>'+
    '<div class="card"><h3>🛡️ DEFENCE — AVG POINTS CONCEDED / GAME (best first)</h3>'+def.map(t=>barRow(t.team,t.avgA,mxA,TCOL[t.team]||'#666')).join('')+'</div>';
}
function buildSplits(){
  const s={};
  const ens=t=>{ if(!s[t]) s[t]={hW:0,hG:0,aW:0,aG:0}; return s[t]; };
  GAMES.forEach(g=>{
    const H=ens(g.home),A=ens(g.away);
    H.hG++;A.aG++;
    if(g.hs>g.as)H.hW++; else if(g.as>g.hs)A.aW++;
  });
  let homeW=0,awayW=0,dr=0;
  GAMES.forEach(g=>{g.hs>g.as?homeW++:g.hs<g.as?awayW++:dr++;});
  const rows=Object.entries(s).map(([t,x])=>({t,hp:x.hG?x.hW/x.hG*100:0,ap:x.aG?x.aW/x.aG*100:0,...x}))
    .sort((a,b)=>(b.hp-b.ap)-(a.hp-a.ap));
  document.getElementById('page-splits').innerHTML=
    '<div class="tiles">'+
    '<div class="tile"><div class="l">HOME WINS</div><div class="v">'+homeW+'</div><div class="s">'+Math.round(homeW/GAMES.length*100)+'% of games</div></div>'+
    '<div class="tile"><div class="l">AWAY WINS</div><div class="v">'+awayW+'</div><div class="s">'+Math.round(awayW/GAMES.length*100)+'% of games</div></div>'+
    '<div class="tile"><div class="l">DRAWS</div><div class="v">'+dr+'</div><div class="s">shared points</div></div></div>'+
    '<div class="card"><h3>🏠 HOME vs ✈️ AWAY WIN RATE BY TEAM</h3><div style="overflow-x:auto"><table><thead><tr><th>Team</th><th>Home W</th><th>Home G</th><th>Home %</th><th>Away W</th><th>Away G</th><th>Away %</th><th>Home Edge</th></tr></thead><tbody>'+
    rows.map(x=>'<tr><td style="font-weight:700">'+x.t+'</td><td>'+x.hW+'</td><td>'+x.hG+'</td><td>'+Math.round(x.hp)+'%</td><td>'+x.aW+'</td><td>'+x.aG+'</td><td>'+Math.round(x.ap)+'%</td><td style="font-weight:800;color:'+((x.hp-x.ap)>=0?'var(--green)':'var(--red)')+'">'+((x.hp-x.ap)>=0?'+':'')+Math.round(x.hp-x.ap)+'%</td></tr>').join('')+
    '</tbody></table></div><p class="note">Neutral/relocated venues counted for the designated home side.</p></div>';
}
buildOverview();buildResults();buildLadder();buildHalves();buildTZ();buildAdv();buildProfiles();buildScouts();buildH2H();buildRecords();buildAttack();buildSplits();

</script></body></html>
